body:
  text: 釋虗舟德真輯一心阿彌陀經若有善男子善女人聞説阿彌陀佛執持名號一心不亂其人臨命終時阿彌陀佛與諸聖衆現在其前是人終時心不顛倒即得往生阿彌陀佛極樂國土一心慈照宗主説古人教親近明師求善知識而善知識實無口傳心授祕密法門只替人解黏去縛便是祕密今但執持名號一心不亂此八箇字即是解黏去縛祕密法門即是出生死堂堂大路朝念莫念行念坐念念念相續自成三昧一乘蓮池大師説念佛之人惟求一乘佛果為期不於餘乘妄有希冀發如是心乃修淨土是為正因苟為不然雖勤念佛因地不真果招迃曲一念慈照宗主説此道至玄至妙亦復至簡至易以簡易故高明者忽焉夫生死不離一念乃至世出世間萬法皆不離一念今即以此念念佛何等切近精實若破此念起處即是自性彌陀即是祖師西來意縱令不悟乘此念力往生極樂且橫截生死不受輪回終當大悟一念蓮宗寶鑑要於靜室正身端坐掃除緣纍截斷情塵瞪開眼睛外不著境內不住定回光一照內外俱寂然後密密舉念南無阿彌陀佛三五聲回光自看云見性則成佛畢竟那箇是我本性阿彌陀却又照看只今舉底這一念從何處起破這一念復又破這底是誰參良久又舉念南無阿彌陀佛又如是如是參急切做工夫勿令間斷惺惺不昧如雞抱卵不拘四威儀中亦如是舉如是看如是參忽於行住坐臥處聞聲見色時豁然明悟親見本性彌陀內外身心一時透脫盡乾坤大地是箇西方萬象森羅無非自己靜無遺照動不離寂一大事慈照宗主説凡修淨土之人灼然是要敵他生死不是説了便休當念無常迅速時不待人須是把做一大事始得若也半進半退似信似疑濟得恁麼事如何出離輪回若是信得及便從今日去發大勇猛發大精進莫問會與不會見性不見性但持只執南無阿彌陀佛如靠著一座須彌山相似搖撼不動專其心一其意或參念觀念憶念十念或默念專念繫念禮念念茲在茲常憶常念朝也念莫也念行也念坐也念心念不空過持佛不離心日日時時不要放捨即是淨念相繼更加智照則知淨土即是自心如此把得定做得主靠得穩縱遇苦樂逆順境界現前只是念阿彌陀佛無一念變異心無一念退惰心無一念雜想心直至盡生永無別念決定要生西方極樂世界果能如是用功則歷劫無明生死業障自然消殞塵勞習漏自然淨盡無餘親見彌陀不離本念功成行滿願力相資臨命終時定生上品一行三昧文殊般若經梵語三昧華言調直定又云正定一行三昧者惟專一行修習正定也謂修行之人應處空間捨諸亂意繫心實理想念一佛專稱名字隨佛方所端身正向能於一佛念念相續而不懈怠於一念中即能得見十方諸佛獲大辨才也一相三昧寶王論修持一相念佛三昧者當於行住坐臥繫念不忘縱令昏寐亦繫念而寢覺即續之不以餘業間斷不以貪嗔等間隔隨犯隨懺悔不隔念不異念不隔日不隔時念念常不離佛念念清淨圓明即是得一相三昧也一境蓮宗寶鑑行人入日觀者須於靜處屏絶外緣正坐攝心諦觀日輪現在目前注心一境凝然寂靜如對明鏡自覩面像心若馳散制之令還心息住定即得三昧一門慈照宗主説妄念是病念佛是藥久病非片劑所能療積妄非暫念所能除其理一也莫管他妄念紛飛只貴在念佛精切字字分明句句接續極力執持方有趨向分所謂真積力久而一旦豁然喻如磨杵作針鍊鐵成鋼者定不誣也入道多門惟此一門最為捷徑不可忽不可忽一息蓮宗寶鑑攝心念佛欲得速成三昧對治昏散之法數息最要凡欲坐時先想己身在圓光中默觀鼻端想出入息每一息默念南無阿彌陀佛一聲方便調息不緩不急心息相依隨其出入行住坐臥皆可行之勿令間斷常自密密行持乃至深入禪定息念兩忘即此身心與虗空等久久純熟心眼開通三昧忽爾現前即是惟心淨土一句憨山大師説凡念佛時先將自己胸中雜亂念頭一齊放下放到無可放處單單提起一句阿彌陀佛歷歷分明心中不斷如線貫珠又如箭筈相拄中間無一毫空隙處如此著力靠定于一切處不被境緣牽引打失日用動靜不雜不亂夢寐如一念到臨命終時一心不亂便是超生淨土之時一聲憨山大師説每日除二時功外單將一聲阿彌陀佛橫在胸中念念不忘心心不昧把一切世事都不思想只將一聲佛作自己命根咬定牙關決不放捨乃至飲食起居行住坐臥此一聲佛時時現前若遇逆順喜怒煩惱境界心不安時就將者一聲佛提起一拶即見煩惱當下消滅以念念煩惱是生死苦根今以念佛消滅煩惱便是佛度生死苦處若念佛消得煩惱便可了得生死更無別法一口氣慈雲式懺主説在俗人塵務忙冗每日清晨服飾已面西合掌念南無阿彌陀佛盡一口氣為一念如是十念但隨氣長短氣極為度其念佛聲不高不低調停得中如此十念連續不斷意在令心不散專精為功顯是藉氣束心也一片憨山大師説若果為生死心切念念若救火然只恐一失人身百劫難復將此一聲佛咬定定要敵過忘想一切處念念現前不被妄想遮障如此下苦切工夫久久純熟自然相應不求成片而自成一片矣一生藕益法師説現前能念之心本自離過絶非不消作意離絶即現前所念之佛本自超情離計何勞説妙談玄祇貴信得及守得穩直下念去或晝夜十萬或五萬三萬以決定不缺為準畢此一生誓無變改若不得往生者三世諸佛便為誑語一點真性禪宗正指但一心念佛不雜一切俗務心無所擾則氣自靜氣靜則神自清神清則耳無邪聽目無邪視心口如一則手口心身混合大定之後我之神御子之神我之氣御子之氣忘我為汝忘汝為我是二是一是一是二不此相不彼相不可以形聲見不可以色身求如此渾渾淪淪自然合體運動隨心靈機不滯矣必須靜息觀自己本來一點真性務要認得大白牛耕田是如何每夕如此行時如在大蘭若坐七相似不過一七期內心性自能領悟即不看經而無一時不誦口不誦佛而心無一時不佛矣今夕行今夕有益明夕行明夕有益一言大顛禪師説欲識佛去處只這語聲是未了之人聽一言只這如今誰動口經云有世界名曰極樂其土有佛號阿彌陀今現在説法諦觀聲聲從自己胸中流出念念不絶十二時內常讀是經呌佛一聲應一聲本來面目太分明若能如是喚作返本還源如何是源水流元在海月落不離天一稱增一阿含經若人以四事極好之物供養大千世界滿中阿羅漢辟支佛所得福德不如有人合掌一稱佛名百千萬分算數譬喻所不能及一稱佛名功德尚爾況復十念一日一月一年一生念佛功德耶現世安隱衆聖守護離諸災厄功德無量一箇歸元直指先德云佛法不是死魚那怕爛却如剝芭蕉相似剝一層又一層剝一層又一層直要剝到無下手處才得打成一片然後著衣喫飯屙屎放尿一動一靜一語一默無不是一箇阿彌陀佛自此心花燦發洞照十方如杲日麗天明鏡當臺不越一念頓成正覺非惟明此一大事佛法世法無不明了亦未可住著須求證悟作家投機印可之後聖凡不立取捨兩忘遍法界是箇自己彌陀盡虗空是箇惟心淨土二心永明禪師説九品經文自有升降上下該攝不出二心一定心如修習定觀上品往生二專心但念名號衆善資熏回向發願得成末品仍須一生歸命盡報精修坐臥之間常面西向念佛發願之時懇苦翹誠無諸異念若在狴牢怨賊所追水火所逼一心求救願脫苦輪速證無生廣度含識紹隆三寶誓報四恩二心真歇禪師説念佛法門徑路修行接上上根器旁引中下之機故一心不亂之説兼含二意曰理一心曰事一心若事一心人皆可行只一憶念如龍得水似虎靠山即楞嚴經憶佛念佛現前當來必定見佛不假方便自得心開若理一心亦非他法直將阿彌陀佛四字做箇話頭二六時中自晨朝十念之頃直下提撕不以有心念不以無心念不以亦有亦無心念不以非有非無心念前後際斷一念不生不涉階梯頓超佛地得非淨土之見佛簡易於宗門乎信知乃佛乃祖在教在禪皆修淨業同歸一願入得此門無量法門悉皆能入二修善導和尚説衆生障重境細心麁識揚神飛觀難成就故大聖悲憐勸修專稱名字正由稱名易故相續即生若能念念相續畢命為期者十即十生百即百生何以故無外雜緣得正念故與佛本願相應故不違教故順佛語故修雜業者百中希得一二千中希得三四何以故乃由雜緣亂動失正念故與佛本願不相應故與教相違故不順佛語故繫念不相續故心不相續念報佛恩故雖作善行常與名利相應故樂近雜緣自障障他往生正行故二持蕅益法師説執持佛號有二持一事持者信有西方阿彌陀佛而猶未達是心作佛是心是佛但以決志願求生故如子憶母無時暫忘名為事持二理持者信彼西方阿彌陀佛是我心具是我心造即以自心所具所造洪名而為繫心之境令不暫忘名為理持二宜錫明居士説念佛宜求生淨土種瓜得瓜種豆得豆念佛自得成佛世人不知極樂淨土人人可到心中先自搖惑反想他生福報遂致一生念佛無成此非佛打誑語乃自己不肯承當走入差路奉勸念佛之人信到十分願到十分行到十分九品蓮胎斷然有分念佛宜廣行衆善娑婆如苦海念佛如乘船生淨土如到彼岸積善如帆楫盤費經中雖言臨終十念可以帶業往生此由夙生修習一念回光頓超三界非可幸而致也苟明知惡不可為而猶任意妄行且等臨終片刻十念天地鬼神豈容如此巧乎往往業境現前連一箇佛字也念不出何能十念奉勸念佛之人當以諸惡莫作衆善奉行八字終身守之終身體之二善彥倫法師説諸大乘經勸生淨土因通二種善一定二散定謂即心觀佛想彼西方依正主伴唯心本具當處皆空全體即假二邊叵得中道不存三諦圓融一心具足故唯心三昧圓常觀體了彼淨土依正色心悉我自心性具功德即境為觀心外無佛性外無土觀之不已證無生忍散謂用純實心信有西方一心不亂繫念彌陀一日七日聲聲不絶念念無間臨命終時佛及聖衆現在其前唯事想彼國但無三觀名散善若定若散利根鈍根皆淨土因咸趣無生永無退轉二出桐江法師論橫豎二出豎出者謂三乘行人依四諦十二因緣六度萬行歷涉地位如取科第須有才學如歷任轉官須有功效橫出者謂念佛求生淨土如人廕敘功由祖父他力不論學問有無又如覃恩普轉功由國王不論歷任淺深二行十疑論欲生淨土須求厭欣二行一者厭離行常觀此身膿血屎尿惡露臭穢不淨初觀世人從情欲貪愛生是種子不淨二觀父母赤白和合是受生不淨三住母胎藏即是住處不淨四在母胎時惟食母血即是食噉不淨五十月滿足從産門出即是初生不淨六內身膿血即是舉體不淨七死後胮脹爛壞即是究竟不淨觀身既爾觀人亦然次觀娑婆穢境衆苦共集應當厭離才生厭離淨土必成二者欣樂行求生淨土為欲救一切衆生苦故是故希心起想樂緣西方淨國百寶莊嚴金地瓊林花池光彩神通自在任意他方永絶死生更無煩惱受諸快樂故須欣樂二不生淨土法語若求其為吾真切教誡莫要乎楊次公之言愛不重不生娑婆念不一不生極樂夫念佛以一其心懇切持名專志不亂此吾所當盡心者然或忘之而不能念念之而不能一無他為情愛之所牽也夫輕愛以杜其妄斬斷情根脫離愛網此吾所當盡心者然或念之而不能忘忘之而不能盡此無他為念心之不能一也故念佛求生淨土之人尋常有娑婆一愛之不輕則臨終為此愛之所牽而不得生矧多愛乎即極樂有一念之不一則臨終為此念之所轉而不得生矧多念乎蓋愛之所以為愛者有輕焉重焉厚焉薄焉正報焉依報焉歷舉其目則父母妻子昆弟朋友功名富貴文章詩賦道術技藝衣服飲食屋室田園林泉花卉珍寶玩物種種妙好不可枚盡大而重於泰山小而輕於鴻毛有一物之不忘愛也有一念之不遺愛也有一愛之存於懷則念不一有一念之不歸於一則不得生二念蓮池大師説念佛有二一者念佛心性二者念佛身名念心性者見真佛也不妨覲光明相好之佛於西方念身名者見應佛也亦能覩自性天真之佛於象外本迹雙舉理事同原二勸淨土晨鐘決定如是可行之謂信決定如是而行之謂修可行而莫之行修既不力雖信無徵故亟勸焉勸有二義一勸自利一勸利他茫茫生死海中惟有空劫以前自己是我本來不早思認取尋解脫之門自甘淪沒誰任其辜且己不修其何以勸人修蓋淨土法門自他兼利宜自他兼修自他兼修故須自他兼勸二警䇿雲棲法彙佛言人命無常促於呼吸少年亦爾何況老乎我今殷勤來相警䇿當觀此身目暗耳聾髮白面皺背傴腰曲骨痛筋攣步履龍鍾精神昏塞譬如夕陽西照光景須臾衰草迎秋凋零頃刻此身不久前路茫茫未知所往誠如己事已辦非愚所量其或不然何不猛省無常戰兢惕勵諦思淨土決志往生放下萬緣一心念佛老堂警策佛言人命無常促於呼吸平人亦爾何況病乎我今殷勤來相警䇿當觀此身四大不調百骸欲散飲食漸減醫藥無靈便利床敷呻吟枕席譬諸魚遊釜內倐忽蕉縻燈在風前剎那熄滅此身不久前路茫茫未知所往誠如己事已辦非愚所量其或不然何不猛省無常戰兢惕勵諦思淨土決志往生放下萬緣一心念佛病堂警策二力淨土十疑論往生淨土必資二種力一者自力二者他力自力者此世界修道實未得生淨土是故瓔珞經云始從具縛凡夫未識三寶不知善惡因之與果初發菩提心以信為本住在佛家以戒為本受菩薩戒身身相續戒行不闕經一劫二劫三劫始至初發心住如是修行十信十波羅蜜等無量行願相續無間滿一萬劫方始至第六正心住若更增進至第七不退住即種性位此約自力卒未得生淨土他力者若信阿彌陀佛大悲願力攝取念佛衆生即能發菩提心行念佛三昧厭離三界身起行施戒修福於一一行中回願生彼彌陀淨土乘佛願力機感相應即得往生二道淨土十疑論十住婆沙論云於此世界修道有二種一者難行道二者易行道難行道者在五濁惡世於無量佛時求阿跋致甚難可得此難無數塵沙説不可盡略陳有五一者外道相善亂菩薩法二者無賴惡人破他勝德三者顛倒善果能壞梵行四者聲聞自利障於大慈五者唯有自力無他力持譬如跛人步行一日不過數里極大辛苦謂自力也易行道者謂信佛語教念佛三昧願生淨土乘彌陀佛願力攝持決定往生不疑也如人水路行藉船力故須臾即至千里謂他力也二種病純陽祖師説此是最圓通最直捷法門必先靜氣一絲不挂實力遵行自有好處然有二種大病而間斷不在此數第一是我要念佛厭人多言厭事多紛未及一串二串嗔心大動無論念之不效即使有益亦不過為冥中官吏不升淨土何也嗔因所至也此最大忌最易犯經云一念嗔心能焚七寶豈不利害此一嗔字不知誤了多少人添了許多病肝氣旺熾相火奔騰小則生狂昧昏亂之症大則喪其本來有如紙入紅爐灰揚頃刻矣安能入佛國清涼法地乎第二是念佛有求求而不應或生後言佛雖不咎其罪報難逭凡人念佛滿五十日三尸怒嫉必生魔障乃至六月然後三尸服而善神至佑汝持佛怒汝謗佛況念佛原在大段上做功夫若求財得財求子得子即使靈驗不過得財得子而已與淨土全不關涉矣不知汝一意行持久久獲效自然財來子得不必汝求也命中所有不念佛亦有所以膏粱紈袴無意修行而命中所無念佛自有所以老宿名僧半生富貴也勉之三心善導和尚説身禮彼佛口稱彼佛意觀彼佛三業真實名至誠心信知自身具足煩惱流轉三界信知彌陀本願下至十念得生無有一念疑心名深心凡所作為一切善根悉皆回向往生名回向發願心具此三心必得往生三心念佛直指執持佛號一行通具三心一直心正念真如法故二深心樂修一切諸善行故三大悲心救拔一切衆生苦故三福觀無量壽佛經欲生彼國者當修三福一者孝養父母奉事師長慈心不殺修十善業二者受持三歸具足衆戒不犯威儀三者發菩提心深信因果讀誦大乘勸進行者三力般舟三昧經念佛往生有三種力一者本有佛性力言煩惱心中有如來藏也二者慈光攝取力言彌陀光明無量念佛衆生攝取不捨也三者念佛三昧力言憶佛念佛現前當來必定見佛也三輩無量壽經十方世界諸天人民其有至心願生彼國凡有三輩上輩者捨家棄欲而作沙門發菩提心一向專念無量壽佛修諸功德願生彼國此等衆生臨壽終時無量壽佛與諸大衆現其人前即隨彼佛往生其國便於七寶華中自然化生住不退轉智慧勇猛神通自在中輩者十方世界諸天人民其有至心願生彼國雖不能行作沙門大修功德當發無上菩提之心一向專念無量壽佛多少修善奉持齋戒起立塔像飯食沙門懸繒然燈散華燒香以此回向願生彼國其人臨終無量壽佛化現其身光明相好具如真佛與大衆現其人前即隨化佛往生其國住不退轉下輩者十方世界諸天人民其有至心欲生彼國假使不能作諸功德當發無上菩提之心一向專意乃至十念念無量壽佛願生其國若聞深法歡喜信樂不生疑惑乃至一念念於彼佛以至誠心願生彼國此人臨終夢見彼佛亦得往生三方便羅什法師説具此三方便者則得生淨土一善於自行而不取相二不取證三善化衆生三疑慈照宗主説念佛人臨終有三疑不生淨土一者疑我生來作業極重修行日淺恐不得生二者疑我欠人債負或有心願未了及貪嗔癡未息恐不得生三者疑我雖念彌陀臨命終時恐佛不來迎接三不信心楊次公説世有善士發三種不信心不求生淨土者尤可嗟惜一曰吾當超佛越祖淨土不足生也二曰處處皆淨土西方不必生也三曰極樂聖域我輩凡夫不能生也三故蓮池大師説世人念佛者多生西方成佛者少其故有三一者口雖念佛心中不善以此不得往生奉勸世人既是念佛便要依佛所説要積德修福要孝順父母要忠事君王要兄弟相愛要夫婦相敬要至誠信實要柔和忍耐要公平正直要陰騭方便要慈愍一切不殺害生命不凌辱下人不欺壓小民但有不好心起著力念定要念退這不好心如此才是念佛的人定得成佛二者口雖念佛心中胡思亂想以此不得往生奉勸世人念佛之時按定心猿意馬字字分明心心照管如親在西方面對彌陀不敢散亂如此才是念佛的人定得成佛三者口雖念佛心中只願求生富貴或説我等凡夫料得無有我分止圖來世不失人身此則不合佛心佛指引爾生西方爾却自不願生以此不得往生奉勸世人凡念佛者決意求生休得疑惑且如天宮富貴福盡也要墮落何況人間富貴能有幾時若説爾是凡夫西方無分則聖賢都是凡夫做安知爾不生西方也便可發廣大心立堅固志誓願往生見佛聞法得無上果廣度衆生如此才是念佛的人定得成佛三專善導和尚説身須專禮阿彌陀佛不雜餘禮口須專稱阿彌陀佛不稱餘號意須專想阿彌陀佛不修餘觀若專修者十即十生百即百生三通大行和尚説心惟信佛佛則知之他心通故口惟稱佛佛則聞之天耳通故身惟禮佛佛則見之天眼通故三慧藕益法師説聞説阿彌陀佛即聞慧執持名號即思慧一心不亂即修慧三較量十疑論無始惡業雖重臨終十念能敵今以三種較量一者在心造惡之時從虗妄顛倒生念佛者從善知識聞佛真實功德名號生一虗一實豈得相比譬如萬年暗室日光暫至豈以久來積暗而不滅也二者在緣造罪之時從癡暗心緣虗妄境界生念佛之心從聞佛功德名號緣無上菩提心生一真一偽豈得相比譬如有人被毒箭中箭深毒慘傷肌破骨一聞滅除藥鼓即箭出毒除豈以箭深毒慘而不出耶三者在決定造罪之時以有間有後心念佛之時以無間無後心遂即捨命善心猛利是以即生譬如十圍大索千夫不制童子揮劒須臾兩分又如千年積柴以一豆火少時焚盡三不可錫明居士説念佛不可附邪教念佛乃正大法門雖覺平易實該圓頓竊恐愚夫愚婦半途厭怠被人誘入天主無為等教反以淨土一門為非生犯重刑死遭地獄可哀可憫奉勸念佛之人老實念去念到一心不亂自然花開見佛切勿揑怪求神妄生別想非徒無益而又害之念佛不可當錢用出世大法莫如念佛每見世人信根不正皆謂所念之佛死後可當錢用以是臨終顛倒但知冥府用錢而不知回向淨土豈不大誤奉勸念佛之人必須歸依阿彌陀佛及觀音勢至諸大菩薩萬不可以此出世大法僅作應酬無常使費也念佛不可妄殺生念佛以慈悲為本如不戒殺功效減少一切衆生皆有佛性歷劫以來同為眷屬殺彼養我情何以堪奉勸念佛之人每下箸時常設此想自能斷葷早成淨業即或不能常齋能持六齋亦得往生若殺生則斷乎不可三䇿淨土或問古人有三種痛鞭之䇿一曰報恩二曰決志三曰求驗第一報恩者既修淨土當念報恩佛恩國恩固未暇論只如父母養育之恩豈非重恩師長作成之德豈非重德你最初出家便説要報重恩後來行腳又説要報重德離鄉別井二三十年父母師長艱難困苦爾總不顧父母老病爾又不看及聞其死爾也不歸如今或在三途受罪受苦望爾救他望爾度他爾却念念間斷淨土不成淨土不成自救不了自救不了如何救他既不能相救爾是忘恩負義大不孝人經云不孝之罪當墮地獄然則一念間斷之心便是地獄業也又且不蠶而衣不耕而食僧房臥具受用現成爾當勤修淨業圖報信施之恩祖師道此是施主妻子分上減刻將來道眼未明滴水寸絲也須牽犂拽把償他始得爾却念念間斷淨土不成淨土不成酬償有分然則一念間斷之心便是畜生業也第二決志者若學專修志須決定爾一生參禪禪既不悟及乎看教教又不明弄到如今念頭未死又要説幾句禪又要説幾句教又要寫幾箇字又要做幾首詩情挂兩頭念分四路祖師道毫𨤲繫念三塗業因瞥爾情生萬劫羈鎖爾却志無決定情念多端間斷正念然則一念間斷之心便是三塗羈鎖業也又且守護戒根志不決定或因身口念念馳求教中道寧以洋銅灌口不可以破戒之口受人飲食寧以熱鐵纏身不可以破戒之身受人衣服況因諸戒不嚴邪心妄動因此妄動間斷專修然則一念間斷之心便是熱鐵洋銅業也又且斷除憎愛志不決定每於虗名浮利自照不破名利屬我便生貪愛名利屬他便生憎妬右人云貪名貪利同趨鬼類逐愛逐憎同入火坑爾却因此愛憎間斷淨土然則一念間斷之心便是餓鬼火坑業也第三取驗者既學專修當求靈驗爾如今髮白面皺死相現前知道臨終更有幾日須在目前便要見佛只如廬山遠法師一生之中三度蒙佛摩頂又如懷感法師稱念佛名便得見佛又如少康法師唱佛一聲衆見一佛從口飛出喝佛十聲則有十佛從口飛出如貫珠焉此等靈驗萬萬千千爾若心無間斷見佛不難間斷心生決不見佛與佛無緣既無佛緣難生淨土淨土不生必墮惡道然則一念間斷之心便是三塗惡道業也戒之戒之如上三策當自痛鞭使其念不離佛佛不離念感應道交現前見佛既見樂之佛即見十方諸佛既見十方諸佛即見自性天真之佛三獨推淨土或問十方如來皆可親近今獨推彌陀其故有三一誓願深重二娑婆有緣三化道相關也願重者經云彌陀往昔因中嘗發種種廣大誓願其略曰若我成佛已來其有衆生願生我國或聞我名修諸善本稱我名號乃至十念若不生者誓不取正覺既生我國若有退轉不決定成佛誓不取正覺故華嚴鈔曰彌陀願重偏接娑婆衆生也有緣者我佛釋迦現在世時衆生聞佛所教歸向彌陀固已多矣觀佛滅後末世衆生無問僧俗男女貴賤貧富稍聞佛教者無不信向未聞佛教者亦會稱名縱是頑愚暴惡無信之徒或遭厄難危險之處或發贊歎怨嗟之聲不覺信口便呌阿彌陀佛至於兒童女子戲弄之際聚沙摶泥圖墻畫壁便作彌陀佛像甚至於學行未穩學語未成者自然能唱阿彌陀佛此皆不勸而發不教而能非有緣而何無量壽經云此經滅後佛法全無但留阿彌陀佛四字名號救度衆生其有不信而謗毀者當墮地獄具受衆苦故天台云當知彼佛於此惡世偏有緣耳相關者先覺謂兩土聖人示居淨穢以折攝二門調伏衆生此以穢以苦以促以多魔惱而折之俾知所厭彼以淨以樂以延以不退轉而攝之俾知所欣既厭且欣則化道行矣又我釋迦於三乘授道之外其有度未盡者度在彌陀故於諸大衆經丁寧反復稱讚勸往者蓋化道之相關也以是三者之故乃獨推焉三道淨土法語夫念不一不生極樂一念之道有三曰信曰行曰願第一信者不疑謂之信苟有疑焉則心不得其一矣是以求生極樂者要以敦信為之始必須遍讀大乘廣學祖教凡是發明淨土之書皆須一一參求悟極樂原是我惟心之淨土不是他土了彌陀原是我本性之彌陀非是他佛一悟妙有遍周遍具以為欣淨之本一悟真空圓離圓脫以為捨穢之原第二行者前敦信如目視今修行如足行信而不行猶有目而無足行而不信猶有足而無目是故信解既備應當念佛修行猶如目足兼備然後能到涼池故次信而説行第三願者夫淨土般若舟航要以信為點頭探水行為篙櫓風帆願為船柁撥正無點頭探水則不知通塞淺深無篙櫓風帆則不能至其所止無船柁撥正則無約束要制故次行以明願如此三法可謂生淨土之弘綱覲彌陀之寶筏一切淨土法門舉不外乎是矣三持蓮池大師説念佛有默持有高聲持有金剛持高聲覺太費力默念又易昏沈只是綿綿密密聲在脣齒之間乃謂金剛持又不可執定或覺費力不妨默持或覺昏沈不妨高聲須句句出口入耳聲聲喚醒自心如一人濃睡一人喚云某人彼即醒矣所以念佛最能攝心三勸蓮池大師説一勸極間人念佛婚嫁都畢子孫克家安間無事正好儘心儘力念佛每日念幾千聲乃至幾萬一勸半忙間人念佛半了不了或忙或間雖不極間亦可忙時治事間時念佛每日念幾百聲乃至幾千一勸極忙人念佛勤勞王事奔波家業雖無間時也須忙裏偷間念佛每日晨朝十念乃至日間或念幾百三關蓮宗寶鑑兜率悅禪師示衆三關一撥草參玄只圖見性只今上人性在甚處二識得本性要脫生死生死到來作麼生脫三脫得生死要知去處四大分離向甚處去透此關則不拘生死不礙去來今念佛人於十二時中持一句阿彌陀佛思專想寂更能回光自看如何是我本性四大分離向甚處去常有此疑驀然識得便知落處即此是直捷底修行正道三觀蓮宗寶鑑夫無明翳乎法性塵沙障乎化導見思阻乎空寂由是立三觀破三惑證三智成三德空觀者破見思惑證一切智成般若德假觀者破塵沙惑證過種智成解脫德中觀者破無明惑證一切種智成法身德行者念佛之時意根為因白毫圓光為緣所起之念即所生法諦觀念佛心起即是假名體之即空洞見此心有如來藏是離邊顯中若根若塵並是法界諸佛衆生一念普應是即邊而中無佛無念此乃大乘圓修三觀念佛也故曰無相無空無不空即是如來真實相三即蓮宗寶鑑阿彌陀佛有廣大願力攝娑婆衆生而歸淨是令反妄而證真也淨土之道其為體也以彌陀即本性其為宗也以淨國即惟心其為用也以仁恕即滅惡生善此之三者蓋顯三世報應制其事一心空寂窮其理俾達乎理者反其妄信其事者遷乎善使一人能行是道以訓于家家以導於鄉鄉以達於以至於無窮則天下之民涵道泳德融神實相高步無何而極佛境界豈止以為善人君子而已哉夫如是則何患乎忠孝不修禮讓不著歟三囚淨土晨鐘錢孝直曰從來三界生死輪回比于牢獄然則但未出生死皆三界獄中囚也囚有三種其一自謂決無生理聊于此中苟圖安逸一朝劊子手到觳觫就斃其一自負千金之子不惜金錢打點營生而情非決定一面且偷遊釜之娛倘再生路絶亦道盡甘心而已別有負性崛強之夫不耐束縛伺守者少間掙斷枷鎖一往無前似此決烈彼安肯于未死前偷享餘生或出不出情懸兩可哉噫此亦我輩生死獄中一榜樣矣第一種人滔滔皆是駕言於功名富貴辛苦博來極宮殿妻妾之奉以自娛樂語以生死恬不關心語以生死外別有出路啞然第付一笑以全不具信根故也第二種人生來亦具宿根禮佛參禪護持教法造寺齋僧金錢不吝然插足世網之中名韁利鎖如入荊棘叢牽絆不得自由夫人生出世一件大事因緣不專心去做而欲以餘力及之世間豈有揚州鶴哉雖生平作福不離人天生死關頭總跳不出亦緣其怖生死心原未真切故也如第三種人不求生富貴但下死工夫乃真能求出生死者矣今見縲絏中人呼天乞命莫不哀其愚而其求生之不早吾謂死囚求生太晚比之我輩猶為早計也死囚秋決歲不過一日一日前後皆可寬然打點我輩在三界獄中歲歲可死月月可死日日刻刻可死賤死貴亦死老死少亦死惡人死好人亦死不序爵不序德不序齒一息不來便分今古不早打點姑待一刻萬一即此一刻駕帖到來劊子當面手忙腳亂何以禦之然罪人入獄時刻求出以知棘墻之外更有許大安樂世界故也今衆生以煩惱為家宅以生死為園囿不知大鐵圍山是我棘墻三界法場之外各各自有家鄉樂地諸佛憫此為分別淨穢指以脫歸路程而歲久拋業之人了無歸處諸佛又大建宅舍以安之一則往來獄門為治道路一則長伺獄外修飾旅館如是之恩何身可報諸佛既不惜垂手接引衆生反戀此毛頭許事死而不悟何哉三待寂室大師説世人欲修淨業不可言我今忙迫且待間暇我今貧乏且待富足我今少壯且待老時若分定常忙分定貧乏分定夭折即於淨業無緣修習忽爾喪亡雖悔何及奉勸諸人趂身康健努力修之四種念佛普賢行願記一稱名念佛謂稱名阿彌陀佛名號於晝夜間一心專注或一萬聲乃至十萬聲如是歲月既久則念念不斷純一無雜臨命終時定見彼佛現身迎接決定往生極樂世界矣二觀像念佛謂觀阿彌陀佛形像相好口稱佛名則心不散亂心不散亂則本性佛從而顯現如是念念不斷純一無雜臨命終時定見彼佛現身迎接決定往生極樂世界矣三觀想念佛謂端坐正念面向西方心作妙觀或想阿彌陀佛眉間白毫相光乃至足下千輻輪相如是從上至下從下至上展轉觀之觀想純熟三昧現前臨命終時決定往生極樂世界矣四實相念佛謂念阿彌陀佛法性之身即得實相之理無形無相猶如虗空心及衆生本來平等如是之念即是真念念念相續三昧現前決定往生極樂世界矣四土蓮宗寶鑑一凡聖同居土此土但有信願念佛不斷煩惱不捨家緣不修禪定臨命終時彌陀接引皆得往生便獲神通得不退轉直至菩提二方便勝居士此土皆是定性小乘根性怕怖三界如虎鬼龍蛇破見思惑殺貪瞋癡斷如來種偏執小見沈空滯寂乃生如來純説大乘調伏三實報莊嚴土此土皆是大乘圓修三觀十住十行十向十地等覺法身大士如塵若沙各各分破無明分身十方度脫衆生菩薩所居四常寂光土此土是最上乘境界惑盡情忘諸法不生般若不生名大涅槃端居此土名清淨法身名到彼岸亦名空劫以前自己四料簡永明禪師説有禪無淨土十人九錯路陰境若現前瞥爾隨他去無禪有淨土萬修萬人去但得見彌陀何愁不開悟有禪有淨土猶如戴角虎現世為人師當來作佛祖無禪無淨土鐵牀並銅柱萬劫與千生沒箇人依怙四料簡蓮池大師説作福不念佛福盡還沈淪念佛不作福入道多苦辛無福不念佛地獄鬼畜羣念佛兼作福後證兩足尊四種饒益慈雲懺主説世尊四種饒益法度諸衆生一者示現相好令觀察者發菩提心二者示現説法令得聞者開悟入道三者示現化事令見聞者獲諸法利四者名號流布十方令其聞者執持繫念罪滅善生而得度脫四意清涼國師説問不求生華藏而生極樂者何耶答有四意一者有緣故彌陀願重偏接娑婆人也二者使衆生歸憑情一故若聞十方皆妙初心茫然無所依託故方便引之三者不離華藏故極樂去此十萬億剎華藏佛剎皆微塵數故不離也四者即本師故經云或有見佛無量壽觀自在等所圍繞疏云讚本尊遮那之德也華藏剎海皆遮那境十萬億剎未出剎種之海豈非本師隨名異化也四關慈照宗主説念佛之人有此四關不生淨土無智之人却言我今念佛又有病苦反謗彌陀因此一念惡心徑入地獄此是一關也雖則持戒念佛緣為口談淨土意緣娑婆不求出世善根為愛家緣長旺以致臨終遭病怕死貪生信受童兒呼神喚鬼燒錢化馬殺戮衆生緣此心邪無佛攝護因茲流浪墮落三塗是二關也或因服藥須用酒腥或被親情𨔛相逼勸此人無決定信喪失善根臨終追赴王前任王判斷是三關也臨終之際思惟活業繫綴資財愛戀眷屬心放不下失却正念故於家舍墮鬼趣中已為禍祟或為慳犬或作蛇身守護家庭宛如在日是四關也四當慈雲懺主説安養淨業捷徑易修諸大乘經皆啓斯要十方諸佛無不稱美若比邱四衆善男信女欲得速破無明永滅五逆十惡重罪及餘輕過當修此法欲得清淨大小戒律具足一切諸波羅蜜門者當學此法欲得臨終離諸怖畏身心安樂喜悅如歸光照室宅異香音樂阿彌陀佛與諸聖衆送紫金臺授手迎接五道橫截九品長騖謝去熱惱安息清涼初離塵勞便登不退不歷長劫即證無生者當學此法欲修少法而感妙報十方諸佛俱時稱讚現前授記一念供養無央數佛還至本國與彌陀坐食觀音議論勢至行步洞視徹聞身量無際飛空自在宿命了了遍觀五道如鏡中像念念證入無盡三昧應當修習此之勝法四不退蕅益法師説往生淨土永不退轉有四義一念不退者破無明顯佛性徑生實報分證寂光二行不退者見思既落塵沙亦破生方便土進趨極果三位不退者帶業往生在同居土蓮華托質永離退緣四畢竟不退者不論至心散心有心無心或解或不解但令彌陀名號一歷耳根或六方佛名或彌陀經名一經於耳假使千萬劫後畢竟因斯度脫譬如聞塗毒鼓遠近皆喪又如食少金剛決定不消也四色蓮華阿彌陀經極樂國土有七寶池八功德水充滿其中池底純以金沙布地四邊階道金銀琉璃玻璃合成池中蓮華大如車輪青色青光黃色黃光赤色赤光白色白光微妙香潔青色名優鉢羅黃色名拘勿頭赤色名鉢頭摩白色名芬陀利色必有光蓋由淨業所感不同此方之華有色無光也四念珠金剛頂瑜伽念珠經念珠者佛令衆生欲滅煩惱當持數珠常隨其身專心繫念諸佛名號故説數珠之多少功德之勝劣而有四種之不同也一千八十珠為上品此珠為上品者以其數多若持此珠念佛名號則功德利益極為上品一百八珠為最勝此珠為最勝以其數次於上品若持以念佛名號則功德利益為最勝五十四珠為中品此珠為中品者以其數次於前若持以念佛名號則功德利益為中品二十七珠為下品此珠為下品者以其數又次於前若持以念佛名號則功德利益為下品然此皆以珠數多寡而分四品之別若能專心持念則功德平等而無異也四不得淨土晨鐘欲辦大事喫緊尤在臨時一著從前悠忽到此延捱不得從前迷著到此糊塗不得從前浮華到此假借不得從前岐路到此徘徊不得只方寸間靈明用事醒則立現蓮臺昧則六道三塗有分淨穢頃刻異路危哉危哉究竟把握要訣不外一心正念四門慈雲懺主説第一禮懺門禮佛懺悔淨除業障使身心皎潔如淨良田第二十念門執持聖號定心成行立願要期植往生正因如下種子第三繫緣門愛護長養滋發芽莖如注以膏雨第四衆福門助成繁茂使速成華果如灌以肥膩相由雖爾若或少暇隨修一門皆得往生四教離念淨土指歸集夫心不孤生必託緣起行者念佛之時意根為因如來毫相為緣所起之念即所生法觀此三相遷動念念不住分析方空即藏教小乘念佛也即觀念佛心起能生所生無不即空妄謂心起體之即空所觀佛相如鏡中像無佛無念即通教大乘念佛也即觀念佛心起即是假名假名之心洞鑑無量名相了知此心有如來藏歷劫斷證離邊顯中無佛無念即別教大乘念佛也即觀念佛心起即空即假即中若根若塵並是法界塵剎諸佛一念照明六道衆生剎那普應初心即是今始覺知如大福人執石成寶必無捨念別求離念即邊而中無佛無念此圓教大乘念佛瓔珞經明頓悟如來即此法也四可龍舒淨土文此淨土法門人若知之如己知之豈不快哉人若不知如己不知豈不痛哉故能勸人修淨土以此善緣消釋罪惡可增崇福壽可莊嚴往生功德可追薦亡者亦可但至誠呪願無不獲其功果四行願慈照宗主説有行無願其行必孤有願無行其願必虗無行無願空住閻浮有行有願直入無為此乃佛祖修淨業之根本也四字教詔大行和尚説往生淨土有四字教詔謂信憶二字不離於心稱敬二字不離於口大抵要須有信信千即千生信萬即萬生信佛名字不離心口諸佛即救諸佛即護心常憶佛口常稱佛身常敬佛始名深信任意早晚終無再住閻浮之法四修天親論觀行四修法用策三心五念之行速得往生一者恭敬修恭敬禮拜彼佛一切聖衆故名恭敬修畢命為期誓不中止即是常時修二者無餘修所謂專稱彼佛名專想專禮讚彼佛及一切聖衆等不雜餘業故名無餘修畢命為期誓不中止即是常時修三者無間修所謂相續恭敬禮拜稱名讚歎憶念觀察回向發願心心相續不以餘業來間故名無間修又不以貪嗔煩惱來間隨犯隨懺不令隔念隔時隔日常使清淨亦名無間修畢命為期誓不中止即是常時修四者回向修謂菩薩已免生死所作善法回求佛果即是自利教化衆生盡未來際即是利他然今時衆生悉煩惱繫縛未免惡道生死等苦隨緣起行一切善根且速回願往生彌陀佛國到彼國已更無所畏如上四修自然任運自利利他無不具足四生蓮宗寶鑑九類衆生一心具足隨造隨成無明暗蔽為卵生煩惱包裹為胎生愛水侵潤為濕生歘起妄念為化生悟即成佛迷號衆生臨命終時作惡而惡境現前念佛而佛界自至若是時中把捉不住常被妄想顛倒所使當風火散壞之時如落湯螃蟹相似又焉能作主宰耶當自念言我今修行淨業本為生死佛祖垂教豈欺我哉當依正法真實存心專念彌陀捨諸虗妄朝思夕想念念願生西方如此則塵勞業識當下瓦解氷消反觀自己生死尚不可得又喚甚麼作衆生乎故懺云於一念中得念佛三昧普度十方六道一切衆生各各出離苦輪同生淨土者是也四如淨土晨鐘衆生愚昧信有形之行業大不信無形之念力尤大何以故念力是行業根一切事業非念不成故人之念頭所係最急如水必赴海如火必炎上如利刃之必傷如毒藥之必殺無空過者念佛之念亦復如是云何念佛而佛不現當知念力是一切法中之王四孝淨土晨鐘世間之孝三出世間之孝一世間之孝一者甘旨以養其親二者爵祿以榮其親三者修德勵行成聖賢以顯其親是世間之所謂孝也出世間之孝勸其親齋戒奉道一心念佛求願往生親覲彌陀得不退轉人子報親於是為大父母在堂早勸念佛父母逝日課佛三年其不能者或一周歲或七七日皆可也四行念佛直指夫戒解行向必從願起乃生淨土何謂為戒行人既修三昧若不持戒雖有信心為彼世間惡緣雜染相侵相奪塵勞難遣毀壞法身令解人邪不得往生經云若一日夜持沙彌戒持具足戒即得往生故必當持戒也何謂為解行人修此三昧求生極樂若不以此深慧妙解知淨穢兩土東西敵立真實不謬又知即此淨穢兩土全具我心不離當念從何法修可得生彼經云讀誦大乘解第一義乃得往生故必當正解也何謂為行行人求生淨土慧解既正則必依解立行六時行道三業無虧直進不退決期生彼經云修行六念回向發願一日乃至七日即得往生故必當立行也何謂為向行人欲必往生於如是戒解行等所生功德及今一切時處與無始來大小善根一一回向淨土臨終乃得決生經云回向願求生極樂國譬如辦事於家歸家得用故必當發回向也此四大法門一句之義能攝一切善法譬如四時成實果各得其要失一不成此四法門亦復如是若失其一三昧不成五敬甘露疏恭敬修法有五一敬有緣尊佛行住坐臥及便穢等皆護西方二敬有緣像教設彌陀像及持其教三敬有緣師友恭敬親近故四敬同學人即同修淨業者互相勸益故五常敬三寶是彼生勝緣故如此敬修決定往生五不退淨土十疑論一大悲攝持不退謂衆生得生淨土者以阿彌陀佛大悲願力攝持不捨故得不退轉也二佛光照燭不退謂衆生得生淨土者常被佛光照燭故菩提之心日得增長而不退轉也三常聞法音不退謂衆生得生淨土者聞諸水鳥樹林風聲樂響皆説苦空無我之法是以常起念佛念法念僧之心而不退轉也四善友同居不退謂衆生得生淨土者以由彼國純諸菩薩以為勝友內無煩惱惑業之纍外無邪魔惡緣之境故一生之後即不退轉也五壽命無量不退謂諸衆生得生淨土者即得壽命無量與佛菩薩平等無二故一生之後即不退轉也五念門天親論有願生彼國者勸修五念門若具定得往生一者身業禮拜門所謂一心專志恭敬合掌香花供養禮拜彼阿彌陀佛禮即專禮彼佛畢命為期不雜餘禮故二者口業讚歎門所謂專憶讚歎彼佛身相光明一切聖衆身相光明及彼國中一切寶莊嚴光明等故三者意業憶念觀察門所謂專意念觀彼佛及一切聖衆身相光明國土莊嚴等如觀經説惟除睡時恆憶恆念恆想恆觀此事等故四者作願門所謂專心若晝若夜一切時一切處三業四儀所作功德不問初中後皆須真實心中發願願生彼國故五者回向門所謂專心自作善根及一切三乘五道一一凡聖等所作善根深生隨喜如諸佛菩薩之所作隨喜我亦如是隨喜以此隨喜善根及己所作善根皆悉與衆生共之回向彼國故又到彼國已得六神通回入生死教化衆生徹窮後際心無厭足乃至成佛是名回向門五惑長蘆賾禪師説修行緣具無若西方淺信之人橫生疑謗竊嘗論之此方之人無不厭俗舍之喧煩慕蘭若之寂靜故有捨家出家則殷勤讚歎而娑婆衆苦何止俗舍之喧煩極樂優遊豈直蘭若之寂靜知出家為美而不願往生其惑一也萬里辛勤遠求知識發明大事決擇死生而彌陀世尊色心業勝願力洪深一演圓音無不明契願參知識而不欲見佛其惑二也叢林廣衆皆樂棲遲少衆道場不欲依附而極樂世界一生補處其數甚多諸上善人俱會一處既欲親近叢林而不慕清淨海衆其惑三也此土之人上壽不過百歲而童癡老耄疾病相仍昏沈睡眠常居太半菩薩猶昏隔陰聲聞尚昧出胎則尺璧寸陰十喪其九而未登不退可謂寒心西方之人壽命無量一託蓮苞更無死苦相續無間直至菩提可謂便獲阿惟越致佛階決定可期而流轉娑婆促景迷於淨土長年其惑四也若乃位居不退果證無生在欲無欲居塵不塵方能興無緣慈運同體悲回入塵勞和光五濁其有淺聞單慧或與少善相應便謂永出四流高超十地詆訶淨土耽戀娑婆掩目空歸宛然流浪並肩牛馬接武泥犂不知自是何人擬比大權菩薩其惑五也五不可思議蕅益法師説信願持名徑登不退有五不可思議之意一橫超三界不俟斷惑故二即於西方橫具四土非由漸證故三但持名號不假禪觀諸方便故四一七為期不藉多劫多生多年月故五持一佛名即為諸佛護念不異持一切佛名故五少不得淨土晨鐘今幸值得意時不肯念到失意時少不得念順境時不肯念到逆境時少不得念無疾痛時不肯念到病篤垂死時少不得念強壯時不肯念到衰暮時少不得念縱眼光垂瞑時不肯念到轉身入木殯埋薦度時少不得念呼吸尚存不知不覺忽然口中念出佛來還算與佛有緣只怕七尺忽橫三寸易斷這句佛要念竟不及耳所以臨終十念即得往生五禪智者大師説行者觀佛住心一境名凝心禪諦觀如來玉毫金相凝然寂靜了亮洞微故也復次前雖凝心所習未慣不覺馳散今制之令還諦觀金相名制心禪復次制心得定既非理觀皆屬事修今體之本空誰凝誰制無佛無念名體真禪復次前雖體真猶滯空寂無量名相昧然不知今以無所得而為方便從空入假萬法洞明不為空塵之所惑亂名方便禪復次前雖體真及以方便各據空有不離二邊今諦觀靜亂本無相貌名言路絶想念都忘名息二邊分別禪五必淨土晨鐘今夫人之朝而必夕也暑而必寒也幼而必壯壯而必老老而必死自古及今如是苟夫人之朝而不為夕謀暑而不為寒謀必羣誚其愚獨自幼至壯且老而濵死不知為之謀其愚不又甚乎當其驀焉而生蠢焉而長頽焉而老以死栩栩焉籧籧焉而愛河欲海之溺人無已時名韁利鎖之牽人無已時一旦灰寒火傳薪換臨了一局誰人能免自茲以往滅滅生生六道三塗如轉轆轤日相尋于生死之業而不求解脫之方謂之愍不畏死可也真能畏死者必求解脫生死之方若求解脫則舍念佛何途之從舍淨土吾誰與歸五不正淨土晨鐘人生如水泡生滅無常況世間無非是苦若大限忽至平生罪惡豈得全無且以目前言之起一不正念説一不正話視一不正色聽一不正聲為一不正事無非過惡況所食者衆生之肉所衣者亦殺衆生而得又況所有過惡不止於食肉衣帛思之誠可畏也閉眼之後不免隨業緣去無有出期唯西方淨土最為超脫捷徑色身難得趂康健時辦此大事五義寶王論夫辟散之要要存於聲聲之不厲心竊竊然飄飄然無定聲之厲也茅連茹乘策其後畢命一對長謝百憂其義一也近而取之聲光所及萬禍氷消功德藂林千山松茂其義二也遠而説之金容熒煌以散彩寶華淅瀝而雨空若指諸掌皆聲致焉其義三也如牽木石重而不前洪音發號飄然輕舉其義四也與魔軍相戰旗鼓相望用聲律於戎軒以定破於強敵其義五也具斯衆義復何厭哉未若喧靜兩全止觀雙運叶夫佛意不亦可乎六度蓮宗寶鑑執持一句阿彌陀佛一念之中與理相應諸法現前六度具足布施則心無染著持戒則不起妄緣忍辱則能所俱忘精進則心無間斷禪定則動靜俱寂智慧則不立絲毫六度蕅益法師説真能念佛放下身心世界即大布施真能念佛不復起貪嗔癡師大持戒真能念佛不計是非人我即大忍辱真能念佛不稍間斷夾雜即大精進真能念佛不復妄想馳逐即大禪定真能念佛不為他岐所惑即大智慧試自簡點若身心世界猶未放下貪瞋癡念猶自現起是非人我猶自挂懷間斷夾雜猶未除盡妄想馳逐猶未永滅種種他岐猶能惑志便不為真念佛也六種念淨土晨鐘真切念佛須具六種念一勇猛念太文弱來不得如孝子報父母深讎縱高崖深澗磷途虎窟必往不怯故一悲傷念太灑落來不得每一想佛身毛皆竪五內若裂如憶少背之慈母及多慧之亡兒故一感憤念太和平來不得如落第孤寒負才寂寞每一念及殆不欲生故一戀慕念太淡泊來不得如己所深愛物魂夢繾綣帷恐或失故一樂事現前踴躍歡喜念如寒得衣飢得食故一惡緣照面悔恨激切念如死裏逃生故總之心口相一字字從肝髓中流出方是念佛真境六根龍舒淨土文千般裝點只為半寸之眼百種音樂只為一豆之耳沈檀腦麝只為兩竅之鼻食前方丈只為三寸之舌妙麗嬌嬈只為臭腐之身隨順逢迎只為狂蕩之意若能識破便無煩惱因有此六根故生無量事造無量業是故如劫火燒諸世界若悟此理雖未生淨土已如生矣六信蕅益法師説一信自者信我現前一念之心本非肉團亦非緣影竪無初後橫絶邊涯終日隨緣終日不變十方虗空微塵國土元我一念心中所現之物我今雖復昏迷倒惑苟能一念回心決定得生自己心中本具極樂更無疑慮是名信自二信他者信彼釋迦如來決無誑語彌陀世尊決無虗願六方諸佛出廣長舌決無二言隨順諸佛真實教誨決志求生更無疑惑是名信他三信因者深信散亂稱名猶為成佛種子何況一心不亂安得非淨土因是名信因四信果者深信淨土上善聚會皆從念佛三昧得生譬如種苽得苽種豆得豆亦如影必隨形響必應聲決無虗棄是名信果五信事者深信只今現前一念不可盡故所以依心所現一切十方世界亦不可盡實有極樂國土在於十萬億土之外最極清淨莊嚴不同莊生寓言是名信事六信理者深信極樂國土雖在十萬億土之遠而實不出我只今現前介爾一念心外以吾現前一念心性實無外故又復深信西方若依若正若主若伴皆吾現前一念妙明真心中所現影全事即理全妄即真全修即性全他即自我心遍故佛心亦遍佛心遍故一切衆生心性亦遍譬如一室千燈光光互遍重重交攝不相妨礙是名信理六不得淨土或問一生造惡臨終念佛帶業往生乃是宿有善根福德因緣方遇知識勸得念佛此等僥幸萬中無一若得病臨死風刀解體四大分離衆苦逼迫忙怖張皇不得念佛更饒你無病而死又或世緣未了世念未休貪生怕死擾亂胸懷若是俗人兼以家私未明後事未辦妻啼子哭百種憂煎不得念佛更饒你未死以前只有些少病痛在身忍疼忍苦呌喚呻吟問藥求醫祈禱懺悔雜念紛飛不得念佛更饒你未病以前只是年紀老大衰相現前困頓龍鍾愁嘆憂惱只向個衰老身上左右安排不得念佛更饒你未老以前正是少壯正好念佛之時稍或狂心未歇俗務相關東攀西緣胡思亂想業識茫茫不得念佛更饒你清間自在有志修行稍於世相之中照不破放不下把不定坐不斷忽然些子境界現前一個主人隨他顛倒不得念佛試看老病之時少壯清間之日稍有一事在心早是不得念佛況待臨終時哉六淨淨土指歸集九界衆生本覺雖淨未聞圓頓大法皆為心垢土垢若衆生以淨信心發願往生心專注故不離當念得見樂華池寶樹清淨境界此名字觀行位人心淨土淨故經曰聞我説壽命長遠深心信解則為見佛常在耆闍崛山共大菩薩諸聲聞衆圍繞説法方便土淨也若破根本無明登十住位證無生法忍此分真位人心淨土淨經云又見此娑婆世界其地琉璃坦然平正諸菩薩衆咸處其中實報土淨也若位登妙覺智斷圓滿此極果聖人心淨土淨經曰唯佛與佛乃能究盡諸法實相釋迦牟尼名毗盧遮那遍一切處其佛所住名常寂光常樂我淨三德涅槃諸佛如來所遊居處方名究竟心淨土淨也愚俗無知以博地凡夫不加修證同佛清淨譬如庶民妄號帝王自取誅滅謗法之罪孰大於是哉六修鄭清之勸修淨土文方念佛時口誦心惟諸惡莫作豈非戒繫念淨境幻塵俱滅豈非定念實無念心華湛然豈非慧人能屏除萬慮一意西方則不施棒喝而悟圓頓機不閲大藏經而得正法眼不持四威儀中而得大自在不垢不淨無縛無脫當是時也孰為戒定慧孰為禪教律我心佛心一無差別此修淨土之極致也六藥福報指南念佛只在一心不亂更無別法譬如以藥治病病者但用目視藥手執藥或有近者以鼻聞藥更有遠者以器貯藥以水浸藥以火烹藥皆曰吾以藥治病此病如何得治至病不愈又言此藥不靈再選方書真可痛憫然他人又不能代為之飲亦奈之何哉且要完幾萬之數是又只要買藥絶不服藥即將此藥積如邱陵病能愈否飲藥以口念佛以心藥必滴滴自口中入佛必聲聲自心中出此真定心之方也七種勝甘露疏念佛功德有七種勝一詞少易行勝惟稱一句南無阿彌陀佛一切人可念故二念緣佛境勝一心緣念佛身相好淨國為境故三離難獲安勝諸佛菩薩加護念佛者無諸患難安慶吉祥四稱名滅罪勝念佛一聲滅八十億劫生死重罪五持念獲福勝稱佛一聲勝四天下七寶供佛及阿羅漢六果感見佛勝衆生念佛必定見佛七親迎往生勝化佛菩薩放光迎接行者往生佛土七正念蓮池大師説真為生死出家直欲一生了辦時時以七事自警務力守之一不得畜資財造房屋買田地置一切精緻好物即經像等傳自太古出自名家皆勿留戀一心正念二不得作種種非緊要福緣事姑俟他日大事已明作之未晚今且權置萬行門一心正念三不得於好色好味等起貪愛心於好言讚譽我者起貪愛心不得於惡色惡味等起嗔惱心於惡言譏毀我者罵辱我者種種拂逆我者起嗔惱心乃至過去未來事或順或違皆悉屏絶堅壁固守一心正念四不得吟作詩文書寫真草題帖對聯修飾尺牘泛覽外書論議他人得失長短乃至教憑臆見而高心著述禪未悟徹而妄意拈評緘口結舌一心正念五不得交結親朋應赴請召遊山玩景雜話間談凡種種世諦中事除理所當為決不可已者餘悉休罷一心正念六不得貪著放逸恣縱睡眠大事未明捍勢忍苦一心正念七不得與世人競才競能爭名爭勢未得言得未證言誑誑稱知識妄自尊高惟應執卑守愚終身居學地而自鍛鍊常精常進一心正念七寶阿彌陀經一金二銀三琉璃四玻璃五𤥭璖六赤珠七瑪琉極樂國土有七寶池上有樓閣亦以此七寶嚴飾之皆是阿彌陀佛大願大行稱性功德之所成就故能普遍莊嚴四種淨土普攝十方三世一切凡聖令得往生也七不妨歸元直指彌陀甚易念淨土甚易生人皆可以通行在官不妨職業在士不妨修讀在商賈不妨販賣在農夫不妨耕種在婦人不妨女工在公門不妨事上在僧徒不妨參禪凡一切所為皆不相妨或在晨昏禮念或在忙裏偷間唯要回向發願願生西方決定往生矣八法維摩詰經菩薩成就八法於此世界行無瘡疣生于淨土饒益衆生而不望報代一切衆生受諸苦惱所作功德盡以施之等心衆生謙下無閡於諸菩薩視之如佛所未聞經聞之不疑不與聲聞而相違背不嫉彼供不高己利而於其中調伏其心常省己過不訟彼短恆以一心求諸功德八信念佛淨土晨鐘凡欲念佛要起信心信念佛定生淨土信念佛定滅諸罪信念佛定得佛護信念佛定得佛證信念佛臨終定得佛來迎接信念佛同信之人皆得往生信念佛往生定得不退地信念佛生淨土定不墮三惡道八功德水阿彌陀經極樂國土有七寶池八功德水充滿其中何謂八功德一澄淨謂其水澄渟潔淨是為澄淨功德二清冷謂其水清瀅涼冷是為清冷功德三甘美謂其水甘甜嘉美是為甘美功德四輕軟謂其水輕浮柔軟是為輕軟功德五潤澤謂其水滋潤澤物是為潤澤功德六安和謂其水人若飲時身心即得安隱調和是為安和功德七除患謂其水人若飲時即能除飢渴等患是為除患功德八增益謂其水人若飲時即能長養善根增益四大是為增益功德八用古音禪師説佛為苦海舟航勸君早渡彼岸一用齋戒為先二用改惡行善三用明師善友四用解脫正願五用知因識果六用有諸方便七用積功纍德八用福緣相贈行住坐臥之中一句彌陀莫斷須信因深果深直教不念自念若能念念不空管取念成一片當念認得念人彌陀與我同現便入念佛三昧親證極樂內院蓮胎標的姓名極功之人自見親見彌陀受記便同菩薩作伴直至無上菩提永劫隨心散誕依得此道歸來決定成佛不欠八念傳家寶念佛虔誠便是丹念珠百八轉循環念成舍利超生死念結菩提了聖凡念意不隨流水去念心常伴白雲間念開妙竅通靈慧念偈今留與汝參此偈是呂祖乩示則釋道兩教何嘗有二乎大抵念佛三昧不涉地位不落階梯一超直入如來實相法門所謂銷我億劫顛倒想不歷僧祇獲法身也八易生淨土十疑論蓋彌陀光明遍照法界念佛衆生攝受不捨聖凡一體機感相應諸佛心內衆生塵塵極樂衆生心中淨土念念彌陀以是觀之智慧者易生能斷疑故禪定者易生不散亂故持戒者易生遠諸染故布施者易生不我有故忍辱者易生不瞋恚故精進者易生不退轉故不造善不作惡者易生念能一故諸惡已作業報已現者易生實慚懼故雖有衆善若無誠信心無深心無回向發願心者則不得上上品生矣噫彌陀甚易持淨土甚易往衆生不能持不能往佛如衆生何九品十六觀經上品上生者若有衆生願生彼國者發三種心即便往生何等為三一者至誠心二者深心三者回向發願心具三心者必生彼國復有三種衆生當得往生何等為三一者慈心不殺具諸戒行二者讀誦大乘方等經典三者修行六念回向發願願生彼國具此功德一日乃至七日即得往生生彼國時此人精進勇猛故阿彌陀如來與觀世音大勢至無數化佛百千比邱聲聞大衆無量諸天七寶宮殿觀世音菩薩執金剛臺與大勢至菩薩至行者前阿彌陀佛放大光明照行者身與諸菩薩授手迎接觀世音大勢至與無數菩薩讚歎行者勸進其心行者見已歡喜踴躍自見其身乘金剛臺隨從佛後如彈指頃往生彼國生彼國已見佛色身衆相具足見諸菩薩色相具足光明寶林演説妙法聞已即悟無生法忍經須臾間歷事諸佛遍十方界於諸佛前次第受記還至本國得無量百千陀羅尼門是名上品上生者上品中生者不必受持讀誦方等經典善解義趣於第一義心不驚動深信因果不謗大乘以此功德回向願求生極樂國行此行者命欲終時阿彌陀佛與觀世音大勢至無量大衆眷屬圍繞持紫金臺至行者前讚言法子汝行大乘解第一義是故我今來迎接汝與千化佛一時授手行者自見坐紫金臺合掌叉手讚歎諸佛如一念頃即生彼國七寶池中此紫金臺如大寶華經宿則開行者身作紫磨金色足下亦有七寶蓮華佛及菩薩俱時放光照行者身目即開明因前宿習普聞衆聲純説甚深第一義諦即下金臺禮佛合掌讚歎世尊經於七日應時即於阿耨多羅三藐三菩提得不退轉應時即能飛行遍至十方歷事諸佛於諸佛所修諸三昧經一小劫得無生忍現前受記是名上品中生者上品下生者亦信因果不謗大乘但發無上道心以此功德回向願求生極樂國行者命欲終時阿彌陀佛及觀世音大勢至與諸菩薩持金蓮華化作五百佛來迎此人五百化佛一時授手讚言法子汝今清淨發無上道心我來迎汝見此事時即自見身坐金蓮華坐已華合隨世尊後即得往生七寶池中一日一夜蓮華乃開七日之中乃得見佛雖見佛身於衆相好心不明了於三七日後乃了了見聞衆音聲皆演妙法遊歷十方供養諸佛於諸佛前聞甚深法經三小劫得百法明門住歡喜地是名上品下生者中品上生者若有衆生受持五戒持八戒齋修行諸戒不造五逆無衆過患以此善根回向願求生於西方極樂世界臨命終時阿彌陀佛與諸比邱眷屬圍繞放金色光至其人所演説苦空無常無我讚歎出家得離衆苦行者見已心大歡喜自見己身坐蓮華臺長跪合掌為佛作禮未舉頭頃即得往生極樂世界蓮華尋開當華敷時聞衆音聲讚歎四諦應時即得阿羅漢道三明六通具八解脫是名中品上生者中品中生者若有衆生若一日一夜持八戒齋若一日一夜持沙彌戒若一日一夜持具足戒威儀無缺以此功德回向願求生極樂國戒香熏修如此行者命欲終時見阿彌陀佛與諸眷屬放金色光持七寶蓮華至行者前行者自聞空中有聲讚言善男子如汝善人隨順三世諸佛教故我來迎汝行者自見坐蓮華上蓮華即合生於西方極樂世界在寶池中經於七日蓮華乃敷華既敷已開目合掌讚歎世尊聞法歡喜得須陀洹經半劫已成阿羅漢是名中品中生者中品下生者若有善男子善女人孝養父母行世仁慈此人命欲終時遇善知識為其廣説阿彌陀佛國土樂事亦説法藏比邱四十八願聞此事已尋即命終譬如壯士屈伸臂頃即生西方極樂世界經七日已遇觀世音及大勢至聞法歡喜得須陀洹過一小劫成阿羅漢是名中品下生者下品上生者或有衆生作衆惡業雖不誹謗方等經典如此愚人多造惡法無有慚愧命欲終時遇善知識為説大乘十二部經首題名字以聞如是諸經名故除却千劫極重惡業智者復教合掌叉手稱南無阿彌陀佛稱佛名故除五十億劫生死之罪爾時彼佛即遣化佛化觀世音化大勢至至行者前讚言善男子以汝稱佛名故諸罪消滅我來迎汝作是語已行者即見化佛光明遍滿其室見已歡喜即便命終乘寶蓮華隨化佛後生寶池中經七七日蓮華乃敷當華敷時大悲觀世音菩薩及大勢至菩薩放大光明住其人前為説甚深十二部經聞已信解發無上道心經十小劫具百法明門得入初地是名下品上生者下品中生者或有衆生毀犯五戒八戒及具足戒如此愚人偷僧祇物盜現前僧物不淨説法無有慚愧以諸惡業而自莊嚴如此罪人以惡業故應墮地獄命欲終時地獄衆火一時俱至遇善知識以大慈悲即為讚説阿彌陀佛十力威德廣讚彼佛光明神力亦讚戒定慧解脫解脫知見此人聞已除八十億劫生死之罪地獄猛火化為清涼風吹諸天華華上皆有化佛菩薩迎接此人如一念頃即得往生七寶池中蓮華之內經於六劫蓮華乃敷觀世音大勢至以梵音聲安慰彼人為説大乘甚深經典聞此法已應時即發無上道心是名下品中生者下品下生者或有衆生作不善業五逆十惡具諸不善如此愚人以惡業故應墮惡道經歷多劫受苦無窮如此愚人臨命終時遇善知識種種安慰為説妙法教令念佛彼人苦逼不遑念佛善友告言汝若不能念彼佛者應稱無量壽佛如是至心令聲不絶具足十念稱南無阿彌陀佛稱佛名故於念念中除八十億劫生死之罪命終之時見金蓮華猶如日輪住其人前如一念頃即得往生極樂世界於蓮華中滿十二大劫蓮華方開觀世音大勢至以大悲音聲為其廣説諸法實相除滅罪法聞已歡喜應時即發菩提之心是名下品下生者九品西方公據三心圓發諦理深明金臺隨往即證無生上品上生達諸法空了無驚動有願即生不必讀誦上品中生但發道心未窮妙理到彼開明獲菩提記上品下生諸戒久持往生如願聞説苦空得阿羅漢中品上生一日一夜奉戒願求蓮開見佛即預聖流中品中生孝友仁慈知識開悟遇二菩薩聞法得度中品下生生平積惡未遇良師一稱佛號生蓮華池下品上生毀戒業深獄火俱至聞法回心衆聖迎去下品中生十惡五逆臨終苦逼教稱十念華開金色下品下生十方三世唯此一乘入得門來無欠無賸九品同歸九祖石芝曉法師説蓮社之立既以廬山遠公為始祖數百年來繼此道者代不乏人莫不仰體佛慈大啓度門異世同風皆衆良導傳記所載誠不可掩故歷代之紀述者録之而為繼祖焉其後有人以慈覺為八祖蓮池為九祖始祖廬山辨覺大師諱慧遠二祖長安光明法師諱善導三祖南嶽般舟和尚諱承遠四祖雲峯五會國師諱法照五祖新定臺巖法師諱少康六祖永明智覺禪師諱延壽七祖昭慶圓淨法師諱省常八祖長蘆慈覺禪師諱宗賾九祖雲棲蓮池大師諱袾宏九祖葆光居士説東林之會現居士身定中受莂即證上品劉遺民為首故蓮池曰觀經敘淨業正因以孝親為第一今遺民少盡孝養而復深入念佛三昧屢感瑞應其往生上品宜矣足為居士修淨業者萬代師法倣蓮社立祖之意以遺民為初祖又以行業昭著者繼定九祖初祖劉程之字仲思號遺民二祖白居易字樂天號香山居士三祖王日休字虗中號龍舒居士四祖葛繁字五祖王古字敏仲六祖楊傑字次公號無為子七祖馮楫號不動居士八祖錢象祖號止菴居士九祖丁明登號蓮侶十心大寶積經若有衆生發十種心專念彼佛是人命終當得往生一無損害心念佛之人於諸衆生常起大慈之心不加損害令得快樂是名無損害心二無逼惱心念佛之人身心安靜於諸衆生常起大悲之心深加愍傷令得脫苦是名無逼惱心三樂守護心念佛之人於佛所説正法當須不惜身命守護愛惜是名樂守護心四無執著心念佛之人常以智慧觀察於一切法不生執著是名無執著心五起淨意心念佛之人能離世間雜染之法復於利養等事常生知足之心是名起淨意心六無忘失心念佛之人求生淨土成佛種智於一切時念念不捨是名無忘失心七無下劣心念佛之人常行平等之心於諸衆生尊重恭敬不生輕慢是名無下劣心八生決定心念佛之人不著世間言論於無上菩提之道深生正信畢竟不惑是名生決定心九無雜染心念佛之人修習功行種諸善根心常遠離一切煩惱雜染是名無雜染心十起隨念心念佛之人雖觀如來相好而不生愛著之心於無念中常念彼佛是名起隨念心十信心淨土指歸集欲了生死修行淨業當發十種信心念念不忘決生淨土一信佛所説法金口誠言真實不虗二信凡夫在迷識神不滅六趣循環不息三信此土修行未得道果不免輪回四信未出輪回雖生天上不免墮落五信極樂世界衆生生者永無退轉六信衆生發願願生淨土決定往生七信一稱佛名能滅八十億劫生死重罪八信念佛之人阿彌陀佛神通光明攝取不捨九信念佛之人十方世界恆沙諸佛同以神力時常護念十信既生淨土壽命無量一生當得無上菩提十無礙淨土指歸集即心觀佛託境顯性心心絶待法法全真有不達者橫生疑謗故今以十種無礙顯淨土之圓融蕩滌執情發明正信一心境一如行人一念是能觀之心彌陀淨土是所觀之境以心外無法故諸佛淨土全是自心以法外無心故此心全是諸佛法體心境叵得心境宛然互泯互存絶思絶議故經云汝等心想佛時是心即是三十二相八十隨形好二修性不二惟心淨土是本具之理全修在性也發願往生是隨緣之事全性成修也以修性不二故諸佛淨土雖本來成現必由淨業成就乃可往生故經云是心作佛是心是佛諸佛正遍知海從心想生三因果理同以衆生諸佛同一體故諸佛已悟衆生在迷迷悟雖殊性常平等是故念佛者即是念一切衆生之本性故經云如心佛亦爾如佛衆生然心佛及衆生是三無差別四真俗雙泯諸法本空纖塵叵得隨緣建立法法宛然以一切法空故心佛叵得以一切法假故心佛宛然以一切法中故心佛不二非有非空絶思絶議故經云無量壽佛身量無邊非是凡夫心力所及然彼如來宿願力故有憶想者必得成就又經云色身非是佛音聲亦復然亦不離色聲見佛神通力五依正互融國土莊嚴依報也佛及菩薩正報也一心具一切剎一一微塵現一切佛及九界衆生以體性本同故是故落日及氷國土莊嚴惟心發現水鳥樹林皆演妙法六勝劣同體諸佛法身從真起應如鏡現像妍醜在機如水起波隨風大小由機有利鈍故應有勝劣而法身之體本來不動故經云阿彌陀佛神通如意於十方國變現自在或現大身滿虗空中或現小身丈六八尺七一多相即一即多故一心一塵遍一切佛剎多即一故一切佛剎全在一心一塵為令心專一故易成就故故令專念一佛而一佛即一切佛故經云見無量壽佛者即見十方一切諸佛八廣狹自在以十方法界不離一微塵故一塵至微量同法界佛剎雖廣不離一塵十萬遐程不逾方寸故經云阿彌陀佛去此不遠如於鏡中自見面像九古今無間以三際不離一念故前際不可得故無過去後際不可得故無未來中際不可得故無現在以世相遷流本常住故經云觀彼久遠猶若今日經須臾間歷事諸佛遍十方界十寂用無礙謂熾然在用不動本際如水起波波全是水淨名云不起滅定現諸威儀易曰寂然不動感而遂通即寂而用故捨穢究盡取淨窮源用而常寂故雖有取捨而實無取捨是故熾然念佛與無念等熾然往生與無生等於無見處不礙見佛於無生處任運往生以圓頓行人語默動靜一切時中皆如實際故經云莊嚴佛土者即非莊嚴滅度無量衆生實無衆生得滅度者此之謂也十勝彌陀懺法阿彌陀佛有十勝一能滿所求勝二親迎往生勝三𫎇光超世勝四聞名得法勝五聞名轉質勝六聞名修敬勝七聞名證果勝八聞名受生勝九聞名具德勝十聞名不退勝十勝慈恩通讚安養比諸天宮有十勝一化主所居勝二所化命長勝三國非界繫勝四淨方無欲勝五女人不居勝六修行不退勝七淨方非穢勝八國土莊嚴勝九念佛攝情勝十十念往生勝十勝彌陀懺法淨土有十勝一生值三寶勝二速得勝法勝三生得身相勝四無惡惟善勝五無苦純樂勝六所須隨念勝七壽命長遠勝八修行不退勝九國非界繫勝十國土莊嚴勝十勝彌陀懺法往生西方有十勝一經説易生勝二時但少修勝三聖衆護念勝四光明攝受勝五乘佛願力勝六化主親迎勝七諸佛證明勝八能滅衆罪勝九衆經共讚勝十法滅獨行勝十勝利稱讚淨土法門經受持佛名者現世當獲十種勝利一者常得一切諸天大力神隱形守護二者常得一切菩薩常隨守護三者常得諸佛晝夜護念阿彌陀佛常放光明攝受此人四者一切惡鬼皆不能害一切蛇龍毒藥悉不能中五者水火冤賊刀箭牢獄橫死枉生悉皆不受六者先所作蘖悉皆消滅所殺冤命彼蒙解脫更無執對七者夜夢正直或復夢見阿彌陀佛勝妙色相八者心常歡喜顏色光澤氣力充盛所作吉利九者常為一切世間人民恭敬供養歡喜禮拜猶如敬佛十者命終之時心無怖畏正念現前得見阿彌陀佛及諸聖衆接引往生淨土盡未來際受勝妙樂十易彌陀懺法得生淨土有十易一彌陀願重得生易如諸經二極樂不逆得生易無量壽經三十方諸佛攝受易稱讚淨土經四東方一佛助成易藥師經五二大聖者來迎易無量壽經六八大菩薩引去易藥師經七奉行十願得生易華嚴經八書寫一經得生易決定光明經九散善回向得生易大寶積經十少時念佛得生易十六觀經十易彌陀懺法往生極樂有十易一信解發心得生易二隨修少善得生易三凡修一觀得生易四慈光願攝得生易五諸教讚勸得生易六諸佛讚勸得生易七衆聖加護得生易八二聖化攝得生易九念滅衆罪得生易十臨終聖迎得生易十易慈雲懺主説淨土十易者一常得見佛無量壽佛成佛以來經十大劫常住不滅故二常聞法音佛及菩薩樹林水鳥常宣妙法故三聖賢會集觀音勢至為其勝友諸上善人俱會一處故四遠離魔事雖有天魔皆護佛法令修行人速成就故五不受輪回蓮華化生無復輪轉生死苦趣故六永離惡道彼佛國土無三惡道名字尚不聞故七勝緣助道瓊樓玉殿珍衣美饌皆為助道之資具故八壽命無量衆生壽量與佛齊等人天凡夫盡其智力莫知其數故九入正定聚衆生生者皆是阿跋致無退轉故十一生行滿常隨佛學一生當得無上菩提故十種功德業報差別經高聲念佛有十種功德一能排睡眠二天魔驚怖三聲遍十方四三塗息苦五外聲不入六令心不散七勇猛精進八諸佛歡喜九三昧現前十往生淨土十只此慈照宗主説專意一念持一句阿彌陀佛只此一念是我本師只此一念即是化佛只此一念是破地獄之猛將只此一念是斬羣邪之寶劍只此一念是開黑暗之明燈只此一念是渡苦海之大船只此一念是脫生死之良方只此一念是出三界之徑路只此一念是本性彌陀只此一念達惟心淨土十念妙應録念佛十聲有蓮華開敷不可思議之理一念佛德水清淨金沙虗明一念佛慧種妙圓寶池湛寂一念佛善根堅固海印妙藏一念佛法芽初生虗空同體一念佛信藕漸長立位不退一念佛願葉已圓諸行無礙一念佛修色各異隨現四種一念佛戒香真潔普聞十方一念佛覺華開敷功德莊嚴一念佛佛果圓成智力廣大十疑智者大師論一無大慈悲疑諸佛菩薩以大悲為業若欲救度衆生祇應願生三界於五濁三塗中救苦衆生因何求生淨土自安其生捨離衆生則是無大慈悲專為自利障菩提道二諸法無生疑諸法體空本來無生平等寂滅今乃捨此求彼生西方彌陀淨土豈不乖理哉又經云若求淨土先淨其心心淨故即佛土淨此云何通三佛土平等疑十方諸佛一切淨土法性平等功德亦等行者普念一切功德生一切淨土今乃偏求一佛淨土與平等性乖云何生淨土四偏念西方疑等是念求生一佛淨土何不十方佛土中隨念一佛淨土隨得往生何須偏念彌陀佛耶五具縛厚重疑具縛凡夫惡業厚重一切煩惱一毫未斷西方淨土出過三界具縛凡夫云何得生六即得不退疑設令具縛凡夫得生彼國邪見三毒等常起云何得生彼國即得不退超過三界七不求兜率疑彌勒菩薩一生補處即得成佛上品十善得生彼處見彌勒菩薩隨從下生三會之中自然而得聖果何須求生西方淨土耶八十念往生疑衆生無始以來造無量業今生一形不逢善知識又復作一切罪業無惡不造云何臨終十念成就即得往生出過三界結業之事云何可通九劣弱人生疑西方去此十萬億佛剎凡夫劣弱云何可到又往生論云女人及根缺二乘種不生既有此教當知女人及以根缺者定必不得往生十作何行業疑今欲決定求生西方未知作何行業以何為種子得生彼國又凡夫俗人皆有妻子未知不斷淫欲得生彼否以上十種設疑以問又一一論答明白文繁不録楊次公云大師援引聖言開決羣疑非法藏後身不能至於是也十不念淨土或問有十種人命終不剋念佛一者善友未必相逢無勸念之理二者或疾苦纏身神昏性亂三者偏風失語不得稱名四者狂亂失心注想難剋五者或逢水火不暇志誠六者輒遇虎狼驚惶倉卒七者臨時惡友破壞道心八者飽食過多昏迷致命九者軍陳鬬戰忽爾身亡十者或墜高巖傷中身命十難慈雲懺主説五濁得道為難淨土修行則易今以娑婆十難示之一不常值佛三界險道佛為導師衆生業重生不值佛釋迦已滅彌勒未生賢聖隱伏邪法增熾故二不聞説法像季澆漓所有言説惟談外道邪惡之論不聞正法故三惡友牽纏邪惡伴侶希求利養扇惑行人墮惡道故四羣魔惱亂九十六種外道惡人壞亂正法使修行者不成就故五輪回不息循環六趣如汲井輪無休息故六難逃惡趣往來三界隨業受報雖生天上未免淪墜故七塵緣障道汩沒塵勞為出世法之障礙故八壽命短促人生百歲夭橫者多光陰迅速菩薩大道難成辦故九修行退失此土修行斷見思惑方能不退初心行人未免退墮故十塵劫難成如大通佛世聞法之徒退大執小經塵點劫住聲聞地雖涉長時未成大道故十難信蓮池大師説淨土為難信之法言難信者有十今居穢土習久心安乍聞彼國清淨莊嚴疑無此事難信一也縱信彼國又疑十方佛剎皆可往生何必定生極樂難信二也縱信當生又疑娑婆之去極樂十萬億剎云何極遠而得往彼難信三也縱信不遠又疑博地凡夫罪障深重云何遽得往生彼國難信四也縱信得生又疑生此淨土必有奇妙法門多種功行云何但持名號遂得往生難信五也縱信持名又疑持此名號必須多歷年劫乃克成就云何一日七日便得生彼難信六也縱信七日得生又疑七趣受生不離胎卵濕化云何彼國悉是蓮華化生難信七也縱信蓮生又疑初心入道多涉退緣云何一生彼國便得不退難信八也縱信不退又疑此是接引鈍機衆生上智利根不必生彼難信九也縱信利根亦生又疑他經或説有佛或説無佛或有淨土或無淨土狐疑不決難信十也今於此世演説此法是猶入裸形之國宣示威儀對生盲之人指陳黑白此之謂難此之謂利他功德不可思議也十失淨土指歸集障重之人不肯進修者有十種失一者不信佛言二者不遵聖教三者不信因果四者不重己靈五者不求升進六者不親善友七者不求解脫八者甘受輪回九者不畏惡道十者甘同魔類十種莊嚴禮念彌陀道場懺法一曰法藏誓願修因莊嚴二曰四十八願願力莊嚴三曰彌陀名號壽光莊嚴四曰三大士觀寶像莊嚴五曰彌陀國土極樂莊嚴六曰寶河清淨德水莊嚴七曰寶殿如意樓閣莊嚴八曰晝夜長遠時分莊嚴九曰二十四樂淨土莊嚴十曰三十種益功德莊嚴以上如經所説極樂莊嚴不可思議勝妙境界十方淨土諸天王宮無能比者是故我等與一切衆生願往彼國同得受用一切莊嚴無盡快樂永得清淨長辭四趣面奉彌陀親承授記六度四等無不備行具四辨才得佛十力相好嚴身神通無礙入金剛心成等正覺十願三時繫念儀範南無本師阿彌陀願我永離三惡道南無本師阿彌陀願我常聞佛法僧南無本師阿彌陀願我勤修戒定慧南無本師阿彌陀願我識破貪嗔癡南無本師阿彌陀願我恆隨諸佛學南無本師阿彌陀願我不退菩提心南無本師阿彌陀願我決定生安養南無本師阿彌陀願我速見彌陀佛南無本師阿彌陀願我分身遍塵剎南無本師阿彌陀願我廣度諸衆生十願弘深不可量心心念念廣宣揚彌陀有願終須到四色蓮花遍界香愛河渺渺廣無邊六根繩纜要牢堅一心繫著菩提岸舉步高登般若船一心念佛莫蹉跎堪歎人生去路多急急稱念彌陀佛莫把光陰溺愛河一句彌陀自主張別無一法可思量明明直指歸家路四衆同登大覺場一句彌陀作話頭單提不用別參求工夫徹透泥團破鐵佛通身也汗流一句彌陀勝坐禪一聲未了一聲連心心念念工夫到在在西方極樂天阿彌陀佛法中王愛河浪裏作舟航一心願度沈淪輩盡到西方極樂十業萬善同歸集夫善惡二輪苦樂二報皆三業所造四緣所生六因所成五果所攝若一念心嗔恚邪淫即地獄業慳貪不施即餓鬼業愚癡暗蔽即畜生業我慢貢高即修羅業堅持五戒即人業精修十善即天業證悟人空即聲聞業知緣性離即緣覺業六度齊修即菩薩業真慈平等即佛業若心淨即香臺寶樹淨剎化生心垢則邱陵坑坎穢土稟質皆是等倫之果能感增上之緣離自心源更無別體十二光大阿彌陀經阿彌陀佛光明有十二號無量光佛無邊光佛無礙光佛無對光佛焰王光佛清淨光佛歡喜光佛智慧光佛不斷光佛難思光佛無稱光佛超日月光佛彼佛光明照十方國無所障礙若有衆生遇斯光者三垢消滅身心柔軟歡喜踊躍善心生焉若在三塗勤苦之處見此光明皆得休息壽終之後皆蒙解脫有一地獄罪人在世之日曾讀彌陀往生經教稍知宿命因緣果報覩此光明心中默念我等受苦皆因前世造諸罪業招此苦報於三塗經無數載冥冥長夜應無此光必是西方極樂阿彌陀佛所放光明救度於我志心正念南無阿彌陀佛令聲不絶具足十念枷鎖解脫彌陀接引乘空而去即得往生西方淨土十二願繫念儀範欲生安養須憑發願若不發願憑何往生故志心發願云願我幻身無疾苦願脫三塗八難門願滅宿生諸業障願除煩惱六情根願身不染邪非觸願出娑婆五濁塵願我勤修不退轉願入如來解脫門願命終時神不亂願得化佛盡來迎願奉彌陀值衆聖願證金剛不壞身十二不思議歸元直指彼阿彌陀佛國土不思議光明不思議壽量不思議慈悲不思議願力不思議神通不思議智慧不思議三昧不思議辨才不思議分身不思議説法不思議度生不思議依正二嚴種種具足汝等今具足乎未具足乎若其未也速須至誠禮佛念佛求生淨土何則執偏迷而修者如跛足人行陸路一日不過數里禮念往生如乘船入水路加以風順須臾便到千里亦如劣夫從轉輪王一日一夜周行四天下非是自力輪王力也又如世人在官難中若自無力得脫須假有力之人救若人牽拽重物自力不任須假衆他之力方能移動禮念求生淨土亦復如是十二力蓮宗寶鑑修淨業者托佛願力觀佛寶相為境故如人近附帝王誰敢干犯況阿彌陀佛有大慈悲力有大誓願力有大智慧力有大三昧力有大威神力有大摧邪力有大降魔力有天眼遠見力有天耳遙聞力有他心徹鑑力有光明遍照攝取衆生力有不可説不可思議無量最勝功德力豈不能護持修行念佛之人至臨終時令無魔障生淨土哉十二檢照心淨土十門教誡若念佛之人塵垢未淨惡念起時須自檢照或有慳貪心嗔恨心癡愛心嫉妬心欺狂心人我心貢高心諂曲心邪見心輕慢心能所心及諸逆順境界隨染所生一切不善之心十四守護心淨土十門教誡念佛之人惡念起時急須念佛常當守護所有深信心志誠心發願回向心慈悲心謙下心平等心方便心忍辱心持戒心喜捨心禪定心精進心菩提心及一切善心十四相寶王論如來世雄考彼羣定以念佛三昧為禪中王諸餘三昧有待有對者皆匹夫之定耳然寶王三昧不住尊相不住卑相邪相正相生死相涅槃相煩惱相菩提相靜相亂相成正覺相度衆生相坐道場相無所住相如是等相皆悉不住猶如夢覺廓無來去故大品經云無去無來是佛十五念佛蓮池大師説夫學佛者無取莊嚴形迹止貴真實修行在家居士不必定要緇衣道巾帶髮之人自可常服念佛不必定要敲魚擊鼓好靜之人自可寂默念佛不必定要成羣作會怕事之人自可閉門念佛不必定要入寺聽經識字之人自可依教念佛千里燒香不如安坐家堂念佛供奉邪師不如孝順父母念佛廣交魔友不如獨身清淨念佛寄庫來生不如現在作福念佛許願保禳不如悔過自新念佛習學外道文書不如一字不識念佛無知妄談禪理不如老實持戒念佛希求妖鬼靈通不如正信因果念佛以要言之端心滅惡如是念佛號曰善人攝心除散如是念佛號曰賢人悟心斷惑如是念佛號曰聖人十六彼此念佛直指彼國衆生無有衆苦但受諸樂故名極樂今以娑婆對比之此則血肉形軀有生皆苦彼則蓮華化生無生苦也此則時序代謝衰老日侵彼則寒暑不遷無老苦也此則四大難調多生病患彼則化體香潔無病苦也此則七十者稀無常迅速彼則壽命無量無死苦也此則親情愛戀有愛必離彼則無父母妻子無愛別離苦也此則仇敵冤讎有冤必會彼則上善聚會無冤憎會也此則困苦飢寒貪求不足彼則衣食珍寶受用現成此則形質寢陋六根多缺彼則端嚴相貌體有光明此則輪轉生死彼則永證無生此有四趣之苦彼無三惡之名此則荊棘坑坎高下不平土石泥沙穢污充滿彼則黃金為地寶樹參天樓聳七珍花敷四色此則雙林已滅龍華未來彼則無量壽尊現在説法此則觀音勢至徒仰嘉名彼則與二上人親為勝友此則羣魔外道惱亂正修彼則佛化一統魔外絶蹤此則媚色妖淫迷惑行者彼則正報清淨實無女人此則惡獸魑魅交扇邪聲彼則水鳥樹林咸宣妙法二土較量境緣逈別勸進世人津津有味顧不向樂而踴躍哉十六觀觀無量壽經頌一日沒觀心海茫茫水接天百千三昧自然成請觀落日如懸鼓一念方登安樂城二水想觀定水汪洋似海溟微瀾不起水更清須臾變作琉璃地宮殿參差倒瀉明三地想觀地平如掌沒邱陵有大金幢自下承無限樓臺皆七寶不知他日與誰登四樹想觀七珍行樹響微風説盡無常與苦空若也一聞登不退不須多劫更修功五池想觀水出摩尼十四支金渠分注入花池花間演法聲哀雅生自珠光彩羽奇六樓想觀百寶樓臺百億重諸天伎樂滿樓中自鳴又有懸空樂皆説三皈念念功七花座觀大寶蓮花特地開百千纓絡挂金臺人人自有登攀分終不回頭意可哀八像想觀池上蓮花次第開紫金光聚立嵬嵬要須念念常觀察往聽如來讚善哉九法身想觀紫摩金像滿虗空紺目澄清與海同莫訝身雲無限量由來不出一心中十觀音想觀最初悲願久彌新十界垂形濟苦倫逆順途中心自若何妨帶果又行因十一勢至想觀頂上花冠戴寶瓶青蓮紺目紫金形經行震動三千界能使無明醉客醒十二普法智觀晝夜常修淨土緣忽然三聖立門前殷勤讚歎兼摩頂頃刻能令坐寶蓮十三雜想觀分身化佛幾千千大小金軀坐儼然玉樹瓊林并寶殿到頭仙樂勝諸天十四上品上生觀幾年精進智今日行裝甚快哉佛自來迎天奏樂觀音親執紫金臺十五中品中生觀持戒持齋是大因忽聞化佛語諄諄金沙池畔青蓮上聊與諸賢結友親十六下品下生觀堪羡庶人智慧深能於地獄便回心縱經多劫留宮內親聽觀音説法音十六想念佛直指若能於此淨土門精進修習日夜不休隨順佛教於此土聲色諸境作地獄想作苦海想作火宅想於諸寶物作苦具想飲食衣服如膿血鐵皮想於眷屬作夜叉羅剎噉人鬼想況復生死不住長劫奔波實可厭離於知識若經卷中聞彼佛願力國土莊嚴於念念中稱彼理趣生安隱想生寶所想生家業想解脫處想彌陀如來菩薩僧衆如慈父想如慈母想生接引想生津梁想於怖畏急難之中稱名即應功不唐捐剎那便至速來救護想應念出離想如是行持功德無量矣十八賢淨土立教志社主東林辨覺大師慧遠西林覺寂大師慧永賓沙門佛陀耶舍此云覺明天竺沙門佛陀跋陀羅此云覺賢東林普濟大師道生鴈門法師慧持法師僧睿曇常曇順曇詵道昺道敬彭城劉遺民仲思豫章雷次宗仲倫鴈門周續之道祖南陽張野萊民南陽張詮秀碩南陽宗炳少文十九念了義吳葦菴居士自惺説每日清晨佛前頂禮十稱以後二六時中得間便念隨處提撕不拘軌則久久行持忽地有省窮障自除慧眼日長打成一片方證菩提所謂咳唾掉臂無不是祖師西來意也或明念謂出聲朗誦手輪數珠流水相續或默念謂閉口暗轉服膺弗失冷暖自知或半明半默念謂名金剛持微動唇舌不落聲聞或莊嚴念謂觀想如來眉放白毫光明晃耀或自在念謂信口純熟食息起居不離這箇或勇猛念謂如逢厄難水火刀兵亟求救脫或舒徐念謂如理亂絲經綸逐漸須要耐煩或登山念謂如臨懸崖不上層巔便墜坑谷或渡海念謂順水揚帆中流黑風飄墮羅剎或行道念謂旋繞階庭身口意到功德最優或佇立念謂恭敬儼若端拱齋如翹勤懇切或靜坐念謂宴安禪定心持六字萬緣頓空或側臥念謂喚醒睡魔按脈當魚遠離惡夢或哀苦念謂如子憶母啼哭號呼瞻依向慕或歡忭念謂如人遠歸六親會面舞蹈不禁或攝心念謂垂簾默記十百千萬毫無間雜或數息念謂對治昏散出入一息默念一聲或參究念謂參禪見性回光返照心佛是誰或實相念謂空諸所有觀境不生寂滅為樂至於性相雙泯無去無來譬彼月光遍照諸品波澄月現法體全彰衆生至誠大慈攝取如艾與珠能引水火自然感應親見彌陀圓覺妙心廓然開悟西方聖境常在目前纖塵不立瀰漫虗空擬議即非揚瞬便是有無俱遣宗説皆忘念佛密因斯為了義十九益萬善同歸集初心菩薩多願生淨土親近諸佛增長法身方能繼佛家業十方濟運有斯利益故必願往按諸經云生安養者緣強地勝福備壽長蓮花化生佛親迎接便登菩薩之位頓生如來之家永處跋致之門盡受菩提之記身具光明妙相迹踐寶樹香臺獻供十方寧神三昧觸耳常聞大乘之法差肩皆鄰補處之人念念虗玄心心靜慮煩惱𦦨滅愛欲泉枯尚無惡趣之名豈有輪回之事法利無邊聖境非虗何乃愛河浪底沈溺無憂火宅焰中焚燒不懼密織癡網淺智之刃莫能揮深種疑根泛信之力焉能遂即甘心伏意幸禍樂災却非清淨之顧戀恐畏之世燋蛾爛繭自處餘殃籠鳥鼎魚翻稱快樂可憐可憫二十正好蓮池大師説蓋此法門不論男女僧俗但一心不亂隨其功行皆得往生若人富貴受用見成正好念佛若人貧窮家計纍小正好念佛若人有子宗祀得託正好念佛若人無子孤身自由正好念佛若人子孝安受供養正好念佛若人子逆免生恩愛正好念佛若人無病趂身康健正好念佛若人有病切近無常正好念佛若人年老光景無多正好念佛若人年少精神清利正好念佛若人處間心無事擾正好念佛若人處忙忙裏偷間正好念佛若人出家逍遙物外正好念佛若人在家知是火宅正好念佛若人聰明通曉淨土正好念佛若人愚魯別無所能正好念佛若人持律律是佛制正好念佛若人看經經是佛説正好念佛若人參禪禪是佛心正好念佛若人悟道悟須佛證正好念佛普勸諸人火急念佛九品往生花開見佛見佛聞法究竟成佛始知自心本來是佛二十四樂安國鈔所言極樂者有二十四樂一欄楯遮防樂二寶網羅空樂三樹陰通衢樂四七寶浴池樂五八水澄樂六下見金沙樂七階際光明樂八樓臺凌空樂九四蓮華香樂十黃金為地樂十一八音常奏樂十二晝夜雨花樂十三清晨䇿勵樂十四嚴持妙花樂十五供養他方樂十六經行本國樂十七衆禽和鳴樂十八六時聞法樂十九存念三寶樂二十無三惡道樂二十一有佛變化樂二十二樹搖羅網樂二十三千國同聲樂二十四聲聞發心樂二十八真念知歸學人説一串數珠不離手一句彌陀不離口高聲念低聲念六字念四字念緊念緩念朗念默念合手念跪膝念面佛念朝西念打板念敲魚念掐珠念行道念禮拜念獨自念同衆念在家念在外念間也念忙也念行也念住也念坐也念臥也念連夢中也念才是真念念得心酸淚下念得火滅灰寒念得神號鬼哭念得天喜神歡一聲佛振動了魔王宮殿一聲佛粉碎了劒樹刀山一聲佛為百劫千生消業障一聲佛為四恩三有啓因緣正是榨到油來擊撞之聲益狠船當浪起搖棹之聲益悲鑊湯在後蓮池在前雖有千萬人阻我不念不可得也三十種益羣疑論西方淨土有三十種益一受用清淨佛土益二得大法樂益三親近佛境益四遊歷十方供佛益五遊諸佛所聞法授記益六福慧資糧疾得圓滿益七速證無上正等菩提益八諸天人等同集一會益九常無退轉益十無量行願念念增進益十一鸚鵡舍利宣揚法音益十二清風動樹如衆樂益十三摩尼水漩宣説苦空益十四諸樂音聲奏衆妙音益十五四十八願永絶三塗益十六真金色身益十七形無醜陋益十八具足五通益十九常住定聚益二十無諸不善益二十一壽命長遠益二十二衣食自然益二十三惟受衆樂益二十四三十二相益二十五無實女人益二十六無有小乘益二十七離於八難益二十八得三法忍益二十九身有常光益三十得那羅延身益三十自慶彌陀懺法大衆若知自慶者則復應須修出世心佛言地獄難免我等相與已得免離此苦是一自慶餓鬼難脫我等相與已得遠離痛切是二自慶畜生難捨相與已得不受其報是三自慶生在邊地不知仁義相與已得共住中國道法流行親承妙旨是四自慶生長壽天不知植福相與已得更復樹因是五自慶人身難得一失不返相與已得各獲人身是六自慶六根不具不預善根相與清淨得深法門是七自慶世智辨聰返成為難相與一心歸憑正法是八自慶佛言見佛為難相與已得瞻對尊像是九自慶佛言聞法復難相與已得䬸服甘露是十自慶佛言出家為難相與已得辭親割愛歸向入道是十一自慶佛言自利者易利他為難相與今日一拜一禮普為十方是十二自慶佛言捍勞忍苦為難相與今日各自翹勤有所為作不為自身是十三自慶佛言讀誦為難我等大衆同得讀誦是十四自慶坐禪為難而今見有息心定意者是十五自慶佛言此教難遇難信難知今遇此教易信易知是十六自慶佛言前生不遇此教所以不出三界六道生死輪回今遇此教現生決定直出三界六道生死輪回是十七自慶佛言衆生濁惡障重福薄雖有此教迷而不知知而不行今遇此教能知能行是十八自慶佛言不知此教多修雜善無決定心不出輪回今遇此教專修一行決出輪回是十九自慶佛言無善根人臨命終時多見惡境或值惡緣不聞經法罪業牽纏哀號恐怖入於地獄求救無門今蒙此教臨命終時值遇善緣及逢善友教修此法廣為演説西方淨土善相勝法一一指陳其心歡喜發願往生或聞善友教稱十念或自念十聲南無阿彌陀佛連連稱念具足十聲惡境便滅善境現前其人自見阿彌陀佛觀音勢至清淨海衆親來迎接身坐蓮臺或乘蓮華身隨佛後往生淨土是二十自慶生淨土已九品四色七寶蓮池自然化生成清淨身離胎胞質是二十一自慶生淨土已身真金色具三十二相形貌端嚴無諸醜陋是二十二自慶生淨土已具六神通飛空自在遊歷十方作大佛事是二十三自慶生淨土已壽命無量與佛齊等更無中夭是二十四自慶生淨土已衣食隨念宮殿逐身自然快樂七寶莊嚴一切具足無求不得是二十五自慶生淨土已具無礙辨才得八萬四千陀羅尼門智慧明了無不通達是二十六自慶生淨土已與大菩薩觀音勢至為其勝友無怨憎會是二十七自慶生淨土已六時聞法悟無生忍是二十八自慶生淨土已更無退轉直至成佛是二十九自慶忍力成就乘大願船却來三界遍歷十方生死海中復度衆生往生淨土同成阿耨多羅三藐三菩提是三十自慶相與志心踴躍歡喜五體投地歸依世間大慈悲父西方極樂世界阿彌陀佛四十八願大阿彌陀經法藏比邱於世自在王如來前發四十八殊勝大願一惡趣無名願若我成佛國土有地獄餓鬼畜生名者我終不取正覺二無墮惡道願若我成佛國中衆生有墮三惡道者我終不取正覺三同真金色願若我成佛國中有情若不皆同真金色者我終不取正覺四形貌無差願若我成佛國土有情形貌差別有好醜者不取正覺五成就宿命願若我成佛國土有情不得宿命不知億那由他百千劫事者不取正覺六生獲天眼願若我成佛國土有情若無天眼不見億那由他百千諸佛國者不取正覺七生獲天耳願若我成佛國中有情不獲天耳不聞億那由他百千諸佛説法者不取正覺八普知心行願若我成佛國土有情無他心智不知億那由他百千佛國有情心行者不取正覺九神足超越願若我成佛國土有情不獲神通於一念頃不能超過億佛剎土者不取正覺十淨無我想願若我成佛國中有情起於少分我我所想者不取正覺十一決定正覺願若我成佛國土有情若不決定成正等覺者不取正覺十二光明普照願若我成佛國土有情光明有限不照那由他百千億佛剎者不取正覺十三壽量無窮願若我成佛國土有情不壽量無限乃至算數劫者不取正覺十四聲聞無數願若我成佛國中聲聞無有能知其數若有知者不取正覺十五衆生長壽願若我成佛國土有情不壽量無限齊者不取正覺除願力受生十六皆獲善名願若我成佛國土有情有不善名者不取正覺十七諸佛稱讚願若我成佛彼無量剎中無數諸佛不共稱讚我國者不取正覺十八十念往生願若我成佛餘剎有情聞我名已願生我國乃至十念若不生者不取正覺除五無間誹謗正法及毀聖人十九臨終現前願若我成佛餘剎有情發菩提心願生極樂臨終我當現其人前若不爾者不取正覺二十回向皆生願若我成佛餘剎有情聞説我名善根回向願生我國若不爾者不取正覺二十一具足妙相願若我成佛國中菩薩皆不具三十二相者不取正覺二十二咸階補處願若我成佛國中菩薩咸悉位階一生補處行普賢道若不爾者不取正覺二十三晨供他方願若我成佛國中菩薩晨朝供養他方無數諸佛食前還至本國若不爾者不取正覺二十四所須滿足願若我成佛國中菩薩所須種種供具於諸佛所植諸善根不圓滿者不取正覺二十五善入本地願若我成佛國中菩薩不善順入一切智者不取正覺二十六那羅延力願若我成佛國中菩薩若無那羅延堅固力者不取正覺二十七莊嚴無量願若我成佛國中諸莊嚴具若有能知及總宣説者不取正覺二十八寶樹悉知願若我成佛國中無量衆色寶樹諸菩薩衆不了知者不取正覺二十九獲勝辨才願若我成佛國土衆生不獲得勝辨才者不取正覺三十大辨無邊願若我成佛國中菩薩若不成就無邊辨才者不取正覺三十一國淨普照願若我成佛國土光淨普照佛剎如明鏡中現其面像若不爾者不取正覺三十二無量勝音願若我成佛國界之內有無量音殊勝超世若不爾者不取正覺三十三蒙光安樂願若我成佛十方衆生蒙我光所照燭者身心安樂若不爾者不取正覺三十四成就總持願若我成佛十方菩薩聞我名者若不得陀羅尼者不取正覺三十五永離女身願若我成佛諸佛土中若有女人聞我名已得清淨信發菩提心來生不捨女人身者不取正覺三十六聞名至果願若我成佛諸佛土中菩薩聞我名已若不修行至菩提者不取正覺三十七天人敬禮願若我成佛十方菩薩聞我名已發清淨心一切天人不敬禮者不取正覺三十八須衣隨念願若我成佛國中衆生所須衣服應念即至若不爾者不取正覺三十九才生心淨願若我成佛諸衆生類才生我國若不皆獲心淨安樂如羅漢者不取正覺四十樹現佛剎願若我成佛國中羣生欲見諸佛淨國於寶樹間悉皆出現若不爾者不取正覺四十一無諸根缺願若我成佛餘剎衆生聞我名已諸根有缺德用非廣者不取正覺四十二現證等地願若我成佛餘剎菩薩聞我名已若不現證三摩地者不取正覺四十三聞生豪貴願若我成佛餘剎菩薩聞我名已壽終不生豪貴家者不取正覺四十四具足善根願若我成佛餘剎菩薩聞我名已若不修行具善根者不取正覺四十五供佛堅固願若我成佛餘剎菩薩聞我名已供養諸佛乃至菩提有退轉者不取正覺四十六欲聞自聞願若我成佛國中菩薩所欲聞法自然得聞若不爾者不取正覺四十七菩提無退願若我成佛餘剎菩薩聞我名已於菩提心有退轉者不取正覺四十八現獲忍地願若我成佛餘剎菩薩聞我名已不獲忍地於諸佛法現證不退轉者不取正覺四十八願蕅益法師説第一願者我本發心為欲上報慈父鍾之鳳生我之恩惟願三寶慈悲力令我無始以來經生慈父咸生淨土速證菩提能令聞我名者亦得上報父恩第二願者我本發心為欲上報悲母金大蓮養育之恩惟願三寶慈悲力令我無始以來經生悲母咸生淨土速證菩提能令聞我名者亦得上報母恩第三願者願度法界虗空界一切衆生盡成佛竟然後我方取泥洹第四願者願我淫機身心俱斷斷性亦無能令聞我名者亦得永斷淫根第五願者願我殺害業習滅盡無餘能令聞我名者遍生慈力第六願者願我癡暗謗三寶業滅盡無餘能令聞我名者正信三寶第七願者願我諸不善業悉得清淨能令聞我名者安住梵行第八願者願我決生極樂世界速證無上菩提分身塵剎度脫衆生盡未來際無有疲厭第九願者願我生生世世不忘本願於五濁世善化衆生第十願者願我在在處處弘通正法無諸魔障十一願者願得無量智慧善能通達一切佛法十二願者願得無量辨才開導羣迷降伏外道一切無畏如獅子吼十三願者願得無量神通遍至十方國土承事一切如來及善知識一切海會無不得與十四願者願我能出種種微妙音聲盡未來際讚歎三寶令諸衆生知所歸依十五願者願能隨意出生種種微妙供養供養三寶為諸衆生作大福田十六願者十方一切衆生所有功德我皆隨喜令其成就無上菩提十七願者十方如來成正覺時我先勸請轉大法輪開示衆生無上覺路十八願者十方如來般涅槃時我悉勸請莫入涅槃常住世間饒益含識十九願者十方如來會中推我為大法王子佛於一切海會讚我功德智慧慈悲願力如觀世音如地藏王等無有異二十願者願以大悲光明照諸地獄觸我光者應時變諸苦事成勝妙樂二十一願者願以大悲光明照諸餓鬼觸我光者應時捨餓鬼身得淨土生二十二願者願以大悲光明照諸畜生蒙我光者離諸怖畏捨身之後得淨土生二十三願者願以大悲光明照諸鬼神蒙我光者悉捨瞋心開悟佛道捨諸醜陋得清淨身二十四願者願以大悲光明照諸苦惱衆生蒙我光者疾病消除六根具足一切厄難皆解脫無量恐怖悉捐除無病延年發菩提意若臨命終即生淨土二十五願者願以大悲光明照觸有形無形有想無想及諸魔外令其身心捨諸邪見通達佛乘二十六願者願以大悲光明照觸人天令其不迷欲樂及欣厭定各各勤求無上菩提二十七願者願以大悲光明照諸聲聞緣覺令其捨無為證速趨佛乘二十八願者願以大悲音聲開示一切衆生令諸衆生決定明悟不戀三界不樂餘乘惟求無上菩提二十九願者願以大悲神力隨順衆生種種所求恆令如願俾于我法生深信心三十願者我以救度衆生故願於十方現作佛身或現淨土攝取衆生莊嚴殊勝踰於極樂或現穢土化導衆生方便無量調伏惡友三十一願者我以救度衆生故願於隨類現身一一類中種族尊勝威德自在令諸同類恭敬愛慕如所教誨直至菩提三十二願者一切無佛法處一切法滅處一切佛法不能行處我誓以大悲方便現身于中隱顯大化為長夜燈救沈冥出於苦海三十三願者願我恆于衆生飢渴之時現作飲食疾疫之時現作藥草寒凍之時現作衣服熱惱之時現作涼風險阻之處現作津梁乃至衆生一切所須皆現作之令諸衆生若服若食若倚若履咸得安樂發菩提心三十四願者若諸衆生樂求佛乘聞我名已不捨肉身得佛菩提證於究竟三十五願者若諸菩薩莊嚴佛土聞我名已其國勝妙踰於極樂欲現穢土則得無量方便善化剛強難化衆生三十六願者若諸衆生欲見諸佛淨土聞説法音我願令彼皆得見聞三十七願者若諸衆生欲往無數世界供養三寶願令一念之間普得周遍三十八願者若諸衆生欲生諸佛淨土聞我名號即得隨願往生三十九願者若諸衆生同我誓願速得無量智慧方便威德自在四十願者若有衆生樂求小乘我願令彼速登聖果即便回心入菩薩乘四十一願者願諸十方修行菩薩聞我名號直至菩提永無魔事四十二願者願諸十方邪魔外道聞我名號即捨邪見同歸正覺四十三願者若有衆生身具五逆十惡四棄八棄當墮大地獄中我願以大悲心力使知求哀懺悔隨現勝妙色身至其人前摩頂安慰令彼罪根永發菩提心四十四願者若有衆生或謗我法或詈我名彼雖障重我誓以平等大慈悲力令其滅惡速趣菩提四十五願者願我慈眼最極清淨普視盡虗空界乃至極苦之處悉令安樂極惡衆生悉令賢善四十六願者願我印手最極莊嚴於念念中出生一切諸供養雲諸珍寶雲諸衣服雲諸衆具雲諸飲食雲諸醫藥雲諸三昧雲諸總持雲諸辨才雲諸光照雲遍虗空界利益衆生盡未來際無有斷絶四十七願者願我名號最極高遠盡十方界靡不周遍乃至法滅之處我名不滅恆令衆生若聞若稱悉得解脫四十八願者願我色身最極微妙以不可説不可説佛剎極微塵數大人之相而自莊嚴一一相有不可説不可説佛剎極微塵數隨形好一一好有不可説不可説佛剎極微塵數光明一一光明皆作不可説不可説佛剎極微塵數色嚴飾國界皆演不可説不可説佛剎極微塵數聲宣揚妙法皆發不可説不可説佛剎極微塵數香普熏一切皆出不可説不可説佛剎極微塵數上妙飲食供養一切皆雨不可説不可説佛剎極微塵數衣服衆具普施一切皆現不可説不可説佛剎極微塵數化佛教化一切一一化佛皆有不可説不可説佛剎極微塵數諸化菩薩以為眷屬一一菩薩皆有不可説不可説佛剎極微塵數殊勝莊嚴一一莊嚴皆作不可説不可説佛剎極微塵數廣大佛事一一佛事皆於不可説不可説佛剎極微塵數世界利益衆生其有衆生見一佛事則得見我微妙色身見我身者則能與我平等能速得成佛跋曩在己巳夏避暑于道菴禪室參禮虗舟長老敬叩佛法大意長老喻以三教原無二致祇在於心之一字蓋惟精惟一允執厥中聖聖相傳之心法也淨智妙圓迥脫根塵佛佛相證之心印也七返九還修煉大寶仙仙相授之心丹也譬如天日光明浮雲蔽暗人為妄想分別所昧不能見自性升沈輪墜轉入諸趣無有了期豈不大可痛惜哉若能回光返照究源徹底則萬有諸法不外乎此之一心云聞之正如頂門一針雖不能言下頓悟然於每境緣動觸之際一念猛省則物我俱空胸襟爽豁此豈非長老熏陶之力乎宗人葆光居士示余以長老所手輯淨土紺珠一册此取淨土經論中屬於數目者彚成而可為返心源之指南渡願海之慈航則尤見其誓度羣品之良匠苦心也不勝景仰謹掇前日之所承聆法誨一則以書卷尾云爾歲庚辰暮春寶華居士帶方劉燁謹跋
