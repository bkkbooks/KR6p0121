front:
  text: 淨土紺珠序余聞之世間萬法不外象數故古昔聖王見河驪而畫八卦得龜瑞而敘九疇此寔為萬有之綱領眾法之樞紐也至若淨土一門是出世間之法簡易直捷尚不落於階級安用此一二三四百千萬億之數目為也但以濁世人修淨土法根幾不同故證果之地自然而現四土九品則何甞外乎此數目哉法幢山虗舟長老早悟宗乘大闡玄風真叢林之領袖末法之津梁也今取經論中淨土句語屬數者輯成一書名曰淨土紺珠盖取張燕公記事不忘之義也在昔天台中峯天如憨山諸師俱是禪宗大匠門庭高峻而及其誨人又拈此門諄諄不已豈非慈悲心切度人為急指示出要之捷徑耶後之讀是編者亦須知師之婆心忉怛也己卯季夏露蓮居士題自敘歲己卯秋余方駐錫于法幢時夜山月吐白篆煙縈青一榻趺坐萬籟俱寂有客叩扄飄然入揖曰吾師宗承臨濟荷擔大法據猊座秉麈拂拈一普光明智橫竪棒喝四十餘年法筵雄徒未聞有一人作家者必是門風高峻躋攀無級耶季世根機承當無力耶柄止此耶緣法未熟耶古德云一向舉揚宗教法堂前草深一丈何不按下雲頭以簡易方便隨機接引乎余曰願聞其說客曰十方如來憐念眾生如母憶子若子逃逝雖憶何為子若憶母如母憶時母子歷生不相違遠若眾生心憶佛念佛現前當來必定見佛去佛不遠不假方便自得心開者此見大圓通之剏自沙劫也念佛三昧者何思專想寂之謂思專則志一不撓想寂則氣虗神朗氣虗則智恬其照神朗則無幽不徹斯二乃是自然之玄符會一而致用假修以凝神積習以移性者是蓮社結集之始于震丹也嗣後歷代宗師唱演者十百正西樂往生者萬千若人信心純至正因凜然重念生死切思輪轉妄緣雲散亂想氷消舉起一聲佛號直下更無異見即佛之念如太阿鋒橫按當軒即念之佛如大火輪星騰𦦨熾使萬物嬰之則燎觸之則傷久久念成念外無別佛佛外無別念身心一致能所兩忘可謂破生死蟄戶之雷霆燭迷妄幽衢之日月倘能如是驀直做去禪淨何甞歧二修證究竟歸一者也吾師何不以此淨土法門攝化有緣勉思彚征乎余默然良久示此紺珠客披覧已曰而今以後知師之垂慈苦心末學淺劣敢肆嘐嘐拜謝而退因綴錄客問以為之引又系以偈曰過去已受無盡苦現在今受無窮苦未來當受無限苦百千萬劫難可數惟有一門可超昇念佛往生安樂剎親見如來無量壽得聞微妙真正法頓悟無上佛菩提智慧神通悉具足往來遊戲十方界供養諸佛受記莂回入娑婆度羣品以報佛恩之萬一是則名為善男子亦得名為大解脫可得名為大夫丈方得名為大菩薩淨土法要以數彚見聞咸證勝妙樂白毫祥光徧大千泥犁翻成藕華國光緒六年己卯孟秋法幢山慧定寺虗舟堂德真識例言內典紀數之書有三藏法數搜羅頗廣而此編則祇取淨土法門中句語屬數者撰成焉淨土法門自匡山大闡以後歷代諸上善人繼躅唱演有論有文有傳錄疏鈔有詩歌偈讚各有發揮而此則剏以數彚卷帙無幾六度萬行包括具足矣自一至十雖廣略不齊皆可臚列而十外之數隨見隨記至四十八而止其餘不切於信行願三門者槩置不錄也禪淨分門立幟交惡相疵盖不識歸元之無二也而且參念止觀之法定慧雙修則禪淨何甞有異此編於參觀二門特加詳明欲使行者惟期曰淨曰禪同證寂光云爾唐張燕公說少事淹貫苦無記性有客贈一紺色珠執握在掌已過瞭然故曰記事珠今取此勿忘之義命名焉自顧寡謏且藏弆無徵捃摭不廣未免漏萬之誚至於贊成全璧庸俟後之博雅諸賢云爾引用書目大寶積經大阿彌陀經阿彌陀經無量壽經觀無量壽佛經文殊般若經維摩詰經般舟三昧經稱讚淨土法門經金剛頂瑜伽念珠經業報差別經增一阿含經觀無量壽經頌普賢行願記甘露疏安國鈔天親論淨土十疑論羣疑論寶王論慈恩通讚禮念彌陀道場懺法淨土立教志淨土十門教誡萬善同歸集龍舒淨土文勸修淨土文三時繫念儀範淨土或問念佛直指福報指南禪宗正指歸元直指集淨土指歸集蓮宗寶鑑雲棲法彚淨土法語夢遊集大明三藏法數淨土晨鐘淨土資糧集淨信堂集傳家寶西方公據妙應錄淨土紺珠目錄一心一心一乘一念一念一大事一行三昧一相三昧一境一門一息一句一聲一口氣一片一生一點真性一言一稱一箇二心二心二修二持二宜二善二出二行二不生二念二勸二警䇿二力二道二種病三心三心三福三力三輩三方便三疑三不信心三故三專三通三慧三較量三不可三䇿三獨推三道三持三勸三關三觀三即三囚三待四種念佛四土四料簡四料簡四種饒益四意四關四當四不退四色蓮華四念珠四不得四門四教離念四可四行願四字教詔四修四生四如四孝四行五敬五不退五念門五惑五不可思議五少不得五禪五必五不正五義六度六度六種念六根六信六不得六淨六修六藥七種勝七正念七寶七不妨八法八信念佛八功德水八用八念八易生九品九品九祖九祖十心十信心十無礙十勝十勝十勝十勝十勝利十易十易十易十種功德十只此十念十疑十不念十難十難信十失十種莊嚴十願十業十二光十二願十二不思議十二力十二檢照心十四守護心十四相十五念佛十六彼此十六觀十六想十八賢十九念了義十九益二十正好二十四樂二十八真念三十種益三十自慶四十八願四十八願
